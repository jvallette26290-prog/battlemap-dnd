<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Battlemap D&D</title>

  <style>
    body { margin:0; background:#111; color:#eee; font-family: Arial, sans-serif; }
/* ✅ Empêche les inputs de déborder (padding + border inclus dans width) */
*, *::before, *::after{
  box-sizing: border-box;
}

#board{
  width: 80vw;                 /* largeur adaptable */
  max-width: 1200px;           /* limite PJ */
  aspect-ratio: 4 / 3;         /* ✅ RATIO MAGIQUE */
  
  background: center / cover no-repeat;
  position: relative;
  margin: 20px auto;
  border: 2px solid #333;
  overflow: hidden;
}
/* ✅ Taille MJ : plus petit (pour laisser de la place autour) */
body.is-mj #board{
  width: 800px;
  height: 550px;
}

#dicePanel{
  width: 1000px;
  margin: 10px auto 30px;
  display: flex;
  gap: 40px;
  align-items: center;
  justify-content: center;
}

#mapPanel{
  width: 1000px;
  margin: 10px auto 10px;
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: center;
}

#mapPanel .mapBtn{
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #222;
  color: #eee;
  cursor: pointer;
}

#mapPanel .mapBtn:active{
  transform: scale(0.98);
}   
    


#diceResult{
  width: 80px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 20px;
  border: 1px solid #333;
  border-radius: 10px;
  background: #151515;
}
    
#diceMsg{
  min-width: 220px;
  font-size: 13px;
  color: #bbb;
  text-align: left;
}

#tokenPanel{
  width: 1200px;
  margin: 10px auto 30px;
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
}

#tokenPanel input, #tokenPanel select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #333;
  background:#151515;
  color:#eee;
}

#addToken{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #333;
  background:#222;
  color:#eee;
  cursor:pointer;
}    
    
/* Animation “ça tourne” */

@keyframes spin{
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}
    
    /* Tokens */
    .token{
  /* on enlève le rond */
  border-radius: 0;

  /* HEXAGONE "flat-top" (haut plat) */
  clip-path: polygon(
    25% 6.7%,
    75% 6.7%,
    100% 50%,
    75% 93.3%,
    25% 93.3%,
    0% 50%
  );

  /* garde tes styles */
  position: absolute;
  z-index: 10;
  cursor: grab;

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  border: 2px solid white;
  box-shadow: 0 0 6px rgba(0,0,0,0.6);

  display: flex;
  align-items: flex-end;
  justify-content: center;

  color: white;
  font-size: 11px;
  font-weight: bold;
  text-shadow: 0 0 4px black;
  padding-bottom: 2px;
  user-select: none;
}
     .token > div{
  width: 100%;
  padding: 0 2px;
}
.token > div > div:first-child{
  background: rgba(0,0,0,0.35);
  border-radius: 6px;
  padding: 0 3px;
  display: inline-block;
}
.token > div > div:last-child{
  margin-top: 2px;
  background: rgba(0,0,0,0.25);
  border-radius: 6px;
  padding: 0 3px;
  display: inline-block;
}
    .token:active { cursor: grabbing; }

    /* Couleurs si pas d'image */
    .pj1 { background-color:#3498db; }
    .pj2 { background-color:#2ecc71; }
    .pj3 { background-color:#e67e22; }
    .pnj { background-color:#e74c3c; }

    /* ===== Modal fiche token ===== */
/* ===== Modal fiche token (Premium Glass) ===== */
.modalHidden{ display:none !important; }

/* ===== Modal plein écran ===== */
#tokenModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display:flex;
  align-items: stretch;     /* ✅ prend toute la hauteur */
  justify-content: center;
  z-index: 9999;
  padding: 16px;
}

/* La "carte" prend (presque) tout l'écran */
.modalCard{
  width: min(1400px, calc(100vw - 24px));  /* ✅ largeur confortable, mais responsive */
  height: 100%;             /* ✅ plein écran */
  max-height: 100%;
  background: linear-gradient(180deg, rgba(30,30,30,0.92), rgba(16,16,16,0.92));
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px;
  box-shadow:
    0 30px 90px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.06);

  display: flex;            /* ✅ permet header / body / footer */
  flex-direction: column;
  overflow: hidden;         /* ✅ pas de débordement */
}

.modalHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;

  padding: 14px 14px 0 14px; /* espace intérieur */
  margin-bottom: 12px;       /* espace avec le contenu */
}

#mTitle{
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 0.2px;
}

#mClose{
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color:#eee;
  border-radius: 12px;
  width: 36px;
  height: 36px;
  cursor:pointer;
}
#mClose:hover{ background: rgba(255,255,255,0.10); }

.modalGrid{
  display:grid;
  grid-template-columns: 84px 1fr;
  gap: 10px 12px;
  align-items:start;
}

/* ✅ zone centrale scrollable */
.modalBody{
  padding: 14px;
  overflow: auto;       /* ✅ scroll */
  flex: 1;              /* ✅ prend toute la place entre header et footer */
}

.modalGrid label{
  color: rgba(255,255,255,0.72);
  font-size: 12px;
  padding-top: 10px;
}

.modalGrid input, .modalGrid textarea{
  width: 100%;
  max-width: 100%;
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
  outline: none;
}
    
.modalGrid input:focus, .modalGrid textarea:focus{
  border-color: rgba(120,180,255,0.55);
  box-shadow: 0 0 0 4px rgba(120,180,255,0.12);
}

.row2{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

/* ===== Ligne PV (3 champs) ===== */
.hpRow{
  display: grid;
  grid-template-columns:
    auto 70px
    auto 70px
    auto 70px;
  align-items: center;
  gap: 8px 10px;
}

.hpRow span{
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.hpRow input{
  width: 100%;
  text-align: center;
}

 /* ===== Jets contre la mort ===== */
.deathSaves{
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 10px 12px;
}

.dsLine{
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0;
  flex-wrap: wrap;
}

.dsLabel{
  min-width: 70px;
  font-size: 12px;
  color: rgba(255,255,255,0.80);
  font-weight: 800;
}

.dsLabel.ok{ color: rgba(140,255,190,0.95); }
.dsLabel.bad{ color: rgba(255,160,160,0.95); }

.dsChk{
  display:flex;
  align-items:center;
  gap:6px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  padding: 6px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03);
}

.dsChk input{
  width: 16px;
  height: 16px;
}   
    
.modalFooter{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 12px;

  padding: 10px 14px 14px 14px; /* espace intérieur */
  margin-top: 0;
  border-top: 1px solid rgba(255,255,255,0.08);
}

    /* ===== Caracs / Skills ===== */
.statGrid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}
.statItem{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}
.statItem span{
  width:38px;
  font-weight:800;
  font-size:12px;
  color: rgba(255,255,255,0.8);
}
.statItem input{
  width:100%;
}

.skillGrid{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap:8px 10px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}

.skillRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.skillVal{
  width:72px;
  min-width:72px;
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
  text-align:center;
}
 
.chk{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color: rgba(255,255,255,0.85);
}
.chk input{
  width:16px;
  height:16px;
}

/* Ligne Maîtrise / Vitesse / Inspiration (sur une seule ligne) */
.tripleLine{
  display: grid;
  grid-template-columns: auto 70px auto 70px auto 70px;
  gap: 10px;
  align-items: center;
}

.tlLbl{
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.tlVal{
  width: 100%;
  text-align: center;
}

.tlChk{
  width: 16px;
  height: 16px;
}

/* Ligne Progression : XP et Dés de vie plus larges */
.tripleLineWide{
  display: grid;
  grid-template-columns:
    auto 70px      /* Niveau */
    auto 110px     /* XP (plus large) */
    auto 110px;    /* Dés de vie (plus large) */
  gap: 10px;
  align-items: center;
}

/* ===== Modal : layout 2 colonnes ===== */
.modalBody{
  padding: 14px;
  overflow: hidden;   /* on évite le scroll global */
  flex: 1;
}

/* conteneur 2 colonnes */
.modalSplit{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  height: 100%;
  min-height: 0;
}

/* chaque colonne scroll indépendamment */
.col{
  overflow: auto;
  min-height: 0;
  padding-right: 6px; /* petit confort scrollbar */
}

/* dans les colonnes : la grille label/champ reste comme avant */
.col .modalGrid{
  display: grid;
  grid-template-columns: 84px 1fr;
  gap: 10px 12px;
  align-items: start;
}

/* bloc compétences (pour qu'il prenne toute la largeur de sa colonne) */
.colRight .skillGrid{
  grid-column: 1 / -1;
}

/* optionnel : rendre les labels un poil plus serrés */
.col .modalGrid label{
  padding-top: 8px;
}    

/* ===== Caracs améliorées : Score / Mod / JS ===== */
.abilityBlock{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.abilityRow{
  display:grid;
  grid-template-columns: 54px 1fr;
  gap:10px;
  align-items:center;
  padding:10px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}

.abilityName{
  font-weight:900;
  text-align:center;
  opacity:.9;
}

.abilityFields{
  display:grid;
  grid-template-columns: repeat(3, 1fr) auto;
  gap:10px;
  align-items:end;
  min-width:0;
}

.af{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
}

.afLbl{
  font-size:11px;
  color: rgba(255,255,255,0.70);
}

.abilityFields input[type="number"],
.abilityFields input[type="text"]{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
}

.abilityFields input[readonly]{
  opacity: .92;
}

.afChk{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
  user-select:none;
  padding-bottom: 8px;
}

.afChk input{
  width:16px;
  height:16px;
} 

/* Boutons dés (icônes) */
.diceBtn{
  width: 35px;
  height: 35px;
  padding: 0;
  border-radius: 14px;
  border: 1px solid #333;
  background: #1b1b1b;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;
}

.diceBtn img{
  width: 120px;
  height: 120px;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
}

.diceBtn:hover{
  background: #222;
}

.diceBtn:active{
  transform: scale(0.96);
}

.diceBtn:disabled{
  opacity: 0.6;
  cursor: not-allowed;
}

/* Animation : on fait tourner l’image du dé */
.diceBtn.rolling img{
  animation: spin 0.6s linear infinite;
}

/* Quand le MJ coupe la grille */
body.grid-off #gridOverlay{
  display: none;
}

/* Style du bouton toggle (MJ) */
#toggleGridBtn{
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #222;
  color: #eee;
  cursor: pointer;
}

#toggleGridBtn.active{
  border-color: rgba(120,180,255,0.55);
  background: rgba(120,180,255,0.18);
}
    
#mAuto{
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color:#fff;
  cursor:pointer;
  font-weight: 800;
}
#mAuto:hover{ background: rgba(255,255,255,0.12); }    
    

#mInfo{
  font-size: 12px;
  color: rgba(255,255,255,0.65);
}

#mSave{
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(120,180,255,0.55);
  background: rgba(120,180,255,0.18);
  color:#fff;
  cursor:pointer;
  font-weight: 800;
}
#mSave:hover{
  background: rgba(120,180,255,0.26);
}

#rollD20:disabled{
  opacity: 0.6;
  cursor: not-allowed;
}
/* ===== Grille hexagonale (overlay) ===== */
#board{ position: relative; }  /* important : pour que l'overlay se place dedans */

#gridOverlay{
  position: absolute;
  inset: 0;                 /* prend toute la surface du board */
  pointer-events: none;     /* ✅ n'empêche pas de cliquer/drag les tokens */
  opacity: 0.35;            /* transparence de la grille (ajuste si besoin) */
  background-repeat: repeat;
  z-index: 5;               /* au-dessus de la map, en-dessous des tokens (tokens z-index:10) */
}
    
/* ===== Barre PV ===== */

  </style>
</head>

<body>

 <div id="board">
  <div id="gridOverlay"></div>
</div>
  <div id="mapPanel">
  <button class="mapBtn" data-map="taverne">🍻 Taverne</button>
  <button class="mapBtn" data-map="donjon">🧱 Donjon</button>
  <button class="mapBtn" data-map="foret">🌲 Forêt</button>
</div>

<div id="dicePanel">

  <button id="rollD4" class="diceBtn" title="Lancer un D4"><img src="d4.png" alt="D4"></button>
  <button id="rollD6" class="diceBtn" title="Lancer un D6"><img src="d6.png" alt="D6"></button>
  <button id="rollD8" class="diceBtn" title="Lancer un D8"><img src="d8.png" alt="D8"></button>
  <button id="rollD10" class="diceBtn" title="Lancer un D10"><img src="d10.png" alt="D10"></button>
  <button id="rollD12" class="diceBtn" title="Lancer un D12"><img src="d12.png" alt="D12"></button>
  <button id="rollD20" class="diceBtn" title="Lancer un D20"><img src="d20.png" alt="D20"></button>
  <button id="rollD100" class="diceBtn" title="Lancer un D100"><img src="d100.png" alt="D100"></button>

  <div id="diceResult">—</div>
  <div id="diceMsg"></div>
</div>

  <div id="tokenPanel">
  <input id="tName" placeholder="Nom (ex: GOBELIN)" />
  <input id="tImg" placeholder="Image (ex: gob.png ou URL)" />
  <input id="tOwner" placeholder="Propriétaire PJ (ex: ALICE) - vide pour PNJ" />
  <select id="tType">
    <option value="pj">PJ</option>
    <option value="pnj">PNJ</option>
  </select>
  <button id="addToken">+ Ajouter token</button>
</div>
  
<div id="tokenModal" class="modalHidden">
  <div class="modalCard">

    <div class="modalHeader">
      <div id="mTitle">Fiche token</div>
      <button id="mClose">✕</button>
    </div>

    <div class="modalBody">
      <div class="modalSplit">

        <div class="col colLeft">
          <div class="modalGrid" id="leftGrid">

            <label>Identité</label>
            <div class="row2">
              <input id="mName" placeholder="Nom" />
              <input id="mClass" placeholder="Classe" />
              <input id="mSubClass" placeholder="Sous-classe" />
              <input id="mRace" placeholder="Race" />
            </div>

            <label>Progression</label>
            <div class="tripleLineWide">
              <span class="tlLbl">Niveau</span>
              <input id="mLevel" class="tlVal" type="number" min="1" max="20" />

              <span class="tlLbl">XP</span>
              <input id="mXp" class="tlVal" type="number" min="0" />

              <span class="tlLbl">Dés de vie</span>
              <input id="mHitDice" class="tlVal" type="text" placeholder="ex: 5d8" />
            </div>

            <label>PV</label>
            <div class="hpRow">
              <span>Actuels</span>
              <input id="mHp" type="number" min="0" />

              <span>Temp.</span>
              <input id="mHpTemp" type="number" min="0" />

              <span>Max</span>
              <input id="mHpMax" type="number" min="0" />
            </div>

            <label>CA</label>
            <input id="mAc" type="number" min="0" />

            <label>Maîtrise</label>
            <div class="tripleLine">
              <span class="tlLbl">Maîtrise</span>
              <input id="mProf" class="tlVal" type="text" inputmode="numeric" placeholder="2" />

              <span class="tlLbl">Vitesse</span>
              <input id="mSpeed" class="tlVal" type="number" min="0" placeholder="9" />

              <span class="tlLbl">Inspiration</span>
              <input id="mInsp" class="tlVal" type="number" min="0" value="0" />
            </div>

             <!-- ===== D&D : Jets contre la mort ===== -->
<label>Jets contre la mort</label>

<div class="deathSaves">
  <div class="dsLine">
    <span class="dsLabel ok">Succès</span>
    <label class="dsChk"><input id="mDsS1" type="checkbox">1</label>
    <label class="dsChk"><input id="mDsS2" type="checkbox">2</label>
    <label class="dsChk"><input id="mDsS3" type="checkbox">3</label>
  </div>

  <div class="dsLine">
    <span class="dsLabel bad">Échec</span>
    <label class="dsChk"><input id="mDsF1" type="checkbox">1</label>
    <label class="dsChk"><input id="mDsF2" type="checkbox">2</label>
    <label class="dsChk"><input id="mDsF3" type="checkbox">3</label>
  </div>
</div>
            
            <label>Caracs</label>

<div class="abilityBlock">

  <!-- FOR -->
  <div class="abilityRow">
    <div class="abilityName">FOR</div>

    <div class="abilityFields">
      <div class="af">
        <div class="afLbl">Score</div>
        <input id="mStr" type="number" min="1" max="30">
      </div>

      <div class="af">
        <div class="afLbl">Mod</div>
        <input id="mStrMod" type="text" readonly>
      </div>

      <div class="af">
        <div class="afLbl">JS</div>
        <input id="mStrSave" type="text" readonly>
      </div>

      <label class="afChk">
        <input id="mStrSaveProf" type="checkbox">
        Maîtrise
      </label>
    </div>
  </div>

  <!-- DEX -->
  <div class="abilityRow">
    <div class="abilityName">DEX</div>
    <div class="abilityFields">
      <div class="af"><div class="afLbl">Score</div><input id="mDex" type="number" min="1" max="30"></div>
      <div class="af"><div class="afLbl">Mod</div><input id="mDexMod" type="text" readonly></div>
      <div class="af"><div class="afLbl">JS</div><input id="mDexSave" type="text" readonly></div>
      <label class="afChk"><input id="mDexSaveProf" type="checkbox"> Maîtrise</label>
    </div>
  </div>

  <!-- CON -->
  <div class="abilityRow">
    <div class="abilityName">CON</div>
    <div class="abilityFields">
      <div class="af"><div class="afLbl">Score</div><input id="mCon" type="number" min="1" max="30"></div>
      <div class="af"><div class="afLbl">Mod</div><input id="mConMod" type="text" readonly></div>
      <div class="af"><div class="afLbl">JS</div><input id="mConSave" type="text" readonly></div>
      <label class="afChk"><input id="mConSaveProf" type="checkbox"> Maîtrise</label>
    </div>
  </div>

  <!-- INT -->
  <div class="abilityRow">
    <div class="abilityName">INT</div>
    <div class="abilityFields">

/* Génère une grille hexagonale "flat-top" (hexagones à plat) */
function setHexGrid(hexSizePx = 35, stroke = "rgba(255,255,255,0.35)", strokeWidth = 1){
  const a = hexSizePx;               // côté de l'hexagone
  const h = Math.sqrt(3) * a;        // hauteur d'un hex flat-top
  const tileW = 3 * a;               // largeur de tuile pour répétition
  const tileH = 2 * h;               // hauteur de tuile pour répétition

  // points d'un hexagone flat-top centré en (cx,cy)
  const hexPath = (cx, cy) => {
    const p = [
      [cx + a,     cy],
      [cx + a/2,   cy + h/2],
      [cx - a/2,   cy + h/2],
      [cx - a,     cy],
      [cx - a/2,   cy - h/2],
      [cx + a/2,   cy - h/2],
    ];
    return "M " + p.map(pt => pt[0].toFixed(2)+","+pt[1].toFixed(2)).join(" L ") + " Z";
  };

  // On dessine plusieurs hex dans la tuile pour que la répétition soit parfaite
  const paths = [
    hexPath(a,     h/2),
    hexPath(2.5*a, h),
    hexPath(2.5*a, 0),
    hexPath(a,     1.5*h),
  ].map(d => `<path d="${d}" fill="none" stroke="${stroke}" stroke-width="${strokeWidth}"/>`).join("");

  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${tileW}" height="${tileH}" viewBox="0 0 ${tileW} ${tileH}">
      ${paths}
    </svg>
  `.trim();

  const uri = `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
  gridOverlay.style.backgroundImage = `url("${uri}")`;
  gridOverlay.style.backgroundSize = `${tileW}px ${tileH}px`;
}

// ===== SNAP HEX (flat-top) =====
function axialRound(q, r){
  // axial -> cube
  let x = q;
  let z = r;
  let y = -x - z;

  // round cube
  let rx = Math.round(x);
  let ry = Math.round(y);
  let rz = Math.round(z);

  const dx = Math.abs(rx - x);
  const dy = Math.abs(ry - y);
  const dz = Math.abs(rz - z);

  if (dx > dy && dx > dz) rx = -ry - rz;
  else if (dy > dz)        ry = -rx - rz;
  else                     rz = -rx - ry;

  // cube -> axial
  return { q: rx, r: rz };
}

// Convertit un point (px,py) -> centre du HEX le plus proche
function snapPointToHexCenter(px, py){
  const a = CURRENT_HEX_PX;            // taille "côté" hex
  const h = Math.sqrt(3) * a;          // hauteur d'un hex

  // ✅ IMPORTANT : ton overlay commence un hex centré en (a, h/2)
  const originX = a;
  const originY = h / 2;

  // translate vers origine
  const x = px - originX;
  const y = py - originY;

  // pixel -> axial (flat-top)
  const q = (2/3) * (x / a);
  const r = (-1/3) * (x / a) + (1/Math.sqrt(3)) * (y / a);

  // arrondi vers l'hex le plus proche
  const ar = axialRound(q, r);

  // axial -> pixel (centre)
  const cx = originX + (3/2) * a * ar.q;
  const cy = originY + h * (ar.r + ar.q/2);

  return { cx, cy };
}

// Clamp dans le board
function clampPosition(el, x, y){
  const maxX = board.clientWidth - el.offsetWidth;
  const maxY = board.clientHeight - el.offsetHeight;
  x = Math.max(0, Math.min(x, maxX));
  y = Math.max(0, Math.min(y, maxY));
  return {x, y};
}

  // ✅ on snap le CENTRE du token sur le CENTRE d'un hex

  const tokenCenterX = left + size/2;
  const tokenCenterY = top  + size/2;

  const { cx, cy } = snapPointToHexCenter(tokenCenterX, tokenCenterY);

  // nouveau top-left
  left = Math.round(cx - size/2);
  top  = Math.round(cy - size/2);

  // re-clamp dans le board (évite de sortir)
  const p = clampPosition(el, left, top);
  el.style.left = p.x + "px";
  el.style.top  = p.y + "px";

  // === conversion en coordonnées relatives ===
  const rx = board.clientWidth  ? p.x / board.clientWidth  : 0;
  const ry = board.clientHeight ? p.y / board.clientHeight : 0;

];

const clientId = localStorage.getItem("battlemap_clientId") || (() => {
  const id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
  localStorage.setItem("battlemap_clientId", id);
  return id;
})();

function showMsg(txt){
  if (diceMsg) diceMsg.textContent = txt || "";
}

function randIntCrypto(min, max) {
  const range = max - min + 1;
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return min + (arr[0] % range);
}

function setAllDiceDisabled(disabled){
  DICE.forEach(d => {
    const btn = document.getElementById(d.id);
    if (btn) btn.disabled = disabled;
  });
}

function setRolling(isRolling){
  DICE.forEach(d => {
    const btn = document.getElementById(d.id);
    if (!btn) return;
    if (isRolling) btn.classList.add("rolling");
    else btn.classList.remove("rolling");
  });
}

function playRollAnimation(label, sides, finalValue) {
  setAllDiceDisabled(true);
  setRolling(true);

  const start = Date.now();
  const duration = 900;

  diceRes.textContent = "…";
  showMsg(`${label} en cours...`);

  const ticker = setInterval(() => {
    diceRes.textContent = `${label} : ${randIntCrypto(1, sides)}`;
    if (Date.now() - start > duration) {
      clearInterval(ticker);
      setRolling(false);
      diceRes.textContent = `${label} : ${finalValue}`;
      showMsg("");
      setAllDiceDisabled(false);
    }
  }, 60);
}

  const sides = Number(data.sides);
  const value = Number(data.value);
  const label = String(data.label || `D${sides}`);

  if (!Number.isFinite(sides) || sides < 2) return;
  if (!Number.isFinite(value) || value < 1 || value > sides) return;

  playRollAnimation(label, sides, value);
});

// Clic sur n’importe quel dé => tente un nouveau jet (cooldown partagé)
DICE.forEach(d => {
  const btn = document.getElementById(d.id);
  if (!btn) return;

  btn.addEventListener("click", async () => {
    if (btn.disabled) return;
    showMsg("");

    const value = randIntCrypto(1, d.sides);
    const rollId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());

    try {
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(diceRef);
        const old = snap.exists() ? snap.data() : null;

        const now = Date.now();
        const lastRollMs = old && Number.isFinite(Number(old.lastRollMs)) ? Number(old.lastRollMs) : 0;

        if (now - lastRollMs < COOLDOWN_MS) {
          const remain = Math.ceil((COOLDOWN_MS - (now - lastRollMs)) / 1000);
          throw new Error("COOLDOWN_" + remain);
        }

        tx.set(diceRef, {
          kind: "dice",
          sides: d.sides,
          label: d.label,
          value,
          rollId,
          by: clientId,
          lastRollMs: now,
          at: serverTimestamp(),
        }, { merge: true });
      });
    } catch (err) {
      const msg = String(err?.message || err);

      if (msg.startsWith("COOLDOWN_")) {
        const remain = msg.split("_")[1] || "5";
        showMsg(`⏳ Cooldown : attends encore ${remain}s`);
      } else {
        showMsg("❌ Erreur de lancer (permissions / réseau ?)");
        console.error(err);
      }
    }
  });
});
  </script>
