<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Battlemap D&D</title>

  <style>
    body { margin:0; background:#111; color:#eee; font-family: Arial, sans-serif; }
/* ✅ Empêche les inputs de déborder (padding + border inclus dans width) */
*, *::before, *::after{
  box-sizing: border-box;
}
    /* Zone map */
    #board{
      width: 800px;
      height: 600px;
      background: url("map2.png") center/cover no-repeat;
      position: relative;
      margin: 20px auto;
      border: 2px solid #333;
      overflow: hidden; /* évite de “perdre” les tokens hors cadre */
    }

#dicePanel{
  width: 1000px;
  margin: 10px auto 30px;
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
}

#rollD20{
  padding: 10px 16px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #222;
  color: #eee;
  cursor: pointer;
}

#rollD20:active{
  transform: scale(0.98);
}

#diceResult{
  width: 80px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 20px;
  border: 1px solid #333;
  border-radius: 10px;
  background: #151515;
}
    
#diceMsg{
  min-width: 220px;
  font-size: 13px;
  color: #bbb;
  text-align: left;
}

#tokenPanel{
  width: 1200px;
  margin: 10px auto 30px;
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
}

#tokenPanel input, #tokenPanel select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #333;
  background:#151515;
  color:#eee;
}

#addToken{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #333;
  background:#222;
  color:#eee;
  cursor:pointer;
}    
    
/* Animation “ça tourne” */
.rolling{
  animation: spin 0.6s linear infinite;
}

@keyframes spin{
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}
    
    /* Tokens */
    .token{
      width: 50px;
      height: 50px;
      border-radius: 50%;
      position: absolute;
      z-index: 10;
      cursor: grab;

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      border: 2px solid white;
      box-shadow: 0 0 6px rgba(0,0,0,0.6);

      display: flex;
      align-items: end;
      justify-content: center;

      color: white;
      font-size: 11px;
      font-weight: bold;
      text-shadow: 0 0 4px black;
      padding-bottom: 2px;
      user-select: none;
    }
    .token:active { cursor: grabbing; }

    /* Couleurs si pas d'image */
    .pj1 { background-color:#3498db; }
    .pj2 { background-color:#2ecc71; }
    .pj3 { background-color:#e67e22; }
    .pnj { background-color:#e74c3c; }

    /* ===== Modal fiche token ===== */
/* ===== Modal fiche token (Premium Glass) ===== */
.modalHidden{ display:none !important; }

/* ===== Modal plein écran ===== */
#tokenModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display:flex;
  align-items: stretch;     /* ✅ prend toute la hauteur */
  justify-content: center;
  z-index: 9999;
  padding: 16px;
}

/* La "carte" prend (presque) tout l'écran */
.modalCard{
  width: min(900px, 100%);  /* ✅ largeur confortable, mais responsive */
  height: 100%;             /* ✅ plein écran */
  max-height: 100%;
  background: linear-gradient(180deg, rgba(30,30,30,0.92), rgba(16,16,16,0.92));
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px;
  box-shadow:
    0 30px 90px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.06);

  display: flex;            /* ✅ permet header / body / footer */
  flex-direction: column;
  overflow: hidden;         /* ✅ pas de débordement */
}

.modalHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;

  padding: 14px 14px 0 14px; /* espace intérieur */
  margin-bottom: 12px;       /* espace avec le contenu */
}

#mTitle{
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 0.2px;
}

#mClose{
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color:#eee;
  border-radius: 12px;
  width: 36px;
  height: 36px;
  cursor:pointer;
}
#mClose:hover{ background: rgba(255,255,255,0.10); }

.modalGrid{
  display:grid;
  grid-template-columns: 84px 1fr;
  gap: 10px 12px;
  align-items:start;
}

/* ✅ zone centrale scrollable */
.modalBody{
  padding: 14px;
  overflow: auto;       /* ✅ scroll */
  flex: 1;              /* ✅ prend toute la place entre header et footer */
}

.modalGrid label{
  color: rgba(255,255,255,0.72);
  font-size: 12px;
  padding-top: 10px;
}

.modalGrid input, .modalGrid textarea{
  width: 100%;
  max-width: 100%;
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
  outline: none;
}
    
.modalGrid input:focus, .modalGrid textarea:focus{
  border-color: rgba(120,180,255,0.55);
  box-shadow: 0 0 0 4px rgba(120,180,255,0.12);
}

.row2{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

/* ===== Ligne PV (3 champs) ===== */
.hpRow{
  display: grid;
  grid-template-columns:
    auto 70px
    auto 70px
    auto 70px;
  align-items: center;
  gap: 8px 10px;
}

.hpRow span{
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.hpRow input{
  width: 100%;
  text-align: center;
}
    
.modalFooter{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 12px;

  padding: 10px 14px 14px 14px; /* espace intérieur */
  margin-top: 0;
  border-top: 1px solid rgba(255,255,255,0.08);
}

    /* ===== Caracs / Skills ===== */
.statGrid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}
.statItem{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}
.statItem span{
  width:38px;
  font-weight:800;
  font-size:12px;
  color: rgba(255,255,255,0.8);
}
.statItem input{
  width:100%;
}

.skillGrid{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap:8px 10px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}
.chk{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color: rgba(255,255,255,0.85);
}
.chk input{
  width:16px;
  height:16px;
}

#mInfo{
  font-size: 12px;
  color: rgba(255,255,255,0.65);
}

#mSave{
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(120,180,255,0.55);
  background: rgba(120,180,255,0.18);
  color:#fff;
  cursor:pointer;
  font-weight: 800;
}
#mSave:hover{
  background: rgba(120,180,255,0.26);
}

/* ===== Barre PV ===== */
.hpBar{
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.10);
  overflow: hidden;
  margin-top: 6px;
}
#hpFill{
  height: 100%;
  width: 0%;
  background: rgba(90, 220, 140, 0.65);
}
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
  getFirestore, doc, setDoc, onSnapshot, serverTimestamp, runTransaction,
  collection, addDoc, deleteDoc, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    
    // ===== QUI EST MJ ? (on le garde, même si fog supprimé) =====
    const params = new URLSearchParams(window.location.search);
    const IS_MJ = params.get("dm") === "1";

    if (!IS_MJ) {
  document.getElementById("tokenPanel").style.display = "none";
}

    // ✅ Salle unique : tout le monde synchronisé ici
    const roomId = "salle1";

    const firebaseConfig = {
    apiKey: "AIzaSyCHg35Sghd5O4oNypF6SNVh5jFDXz2TsxU",
    authDomain: "battlemap-dnd.firebaseapp.com",
    projectId: "battlemap-dnd",
    storageBucket: "battlemap-dnd.firebasestorage.app",
    messagingSenderId: "118091329664",
    appId: "1:118091329664:web:c7072920354d41d9a77665"
  };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const board = document.getElementById("board");

    // ===== Gestion touche F =====
let isFPressed = false;

document.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "f") {
    isFPressed = true;
  }
});

document.addEventListener("keyup", (e) => {

});

});
    
    // ===== FICHE TOKEN (modal) =====
const modal = document.getElementById("tokenModal");
const mClose = document.getElementById("mClose");
const mSave  = document.getElementById("mSave");
const mTitle = document.getElementById("mTitle");
const mInfo  = document.getElementById("mInfo");

const mName   = document.getElementById("mName");
const mHp     = document.getElementById("mHp");
const mHpTemp = document.getElementById("mHpTemp");    
const mHpMax  = document.getElementById("mHpMax");
const mAc     = document.getElementById("mAc");
const mStatus = document.getElementById("mStatus");
const mNotes  = document.getElementById("mNotes");

// ===== Caractéristiques =====
const mStr = document.getElementById("mStr");
const mDex = document.getElementById("mDex");
const mCon = document.getElementById("mCon");
const mInt = document.getElementById("mInt");
const mWis = document.getElementById("mWis");
const mCha = document.getElementById("mCha");

// ===== Compétences =====
const mSkillAcro = document.getElementById("mSkillAcro");
const mSkillAnim = document.getElementById("mSkillAnim");
const mSkillArca = document.getElementById("mSkillArca");
const mSkillAthl = document.getElementById("mSkillAthl");
const mSkillDece = document.getElementById("mSkillDece");
const mSkillHist = document.getElementById("mSkillHist");
const mSkillInsi = document.getElementById("mSkillInsi");
const mSkillInti = document.getElementById("mSkillInti");
const mSkillInve = document.getElementById("mSkillInve");
const mSkillMedi = document.getElementById("mSkillMedi");
const mSkillNatu = document.getElementById("mSkillNatu");
const mSkillPerc = document.getElementById("mSkillPerc");
const mSkillPers = document.getElementById("mSkillPers");
const mSkillReli = document.getElementById("mSkillReli");
const mSkillSlei = document.getElementById("mSkillSlei");
const mSkillStea = document.getElementById("mSkillStea");
const mSkillSurv = document.getElementById("mSkillSurv");
const mSkillPerf = document.getElementById("mSkillPerf");    
let openedTokenId = null;

function openModal(){
  modal.classList.remove("modalHidden");
}

function closeModal(){
  modal.classList.add("modalHidden");
  openedTokenId = null;
  if (mInfo) mInfo.textContent = "";
}

// bouton X
mClose.addEventListener("click", closeModal);

// clic en dehors de la carte = fermer
modal.addEventListener("click", (e) => {
  if (e.target === modal) closeModal();
});

// helper statuts
function parseStatus(str){
  return (str || "")
    .split(",")
    .map(s => s.trim())
    .filter(Boolean);
}

function updateHpBar(){
  const hpFill = document.getElementById("hpFill");
  if (!hpFill) return;

  const hp = Number(mHp.value);
  const hpMax = Number(mHpMax.value);

  if (Number.isFinite(hp) && Number.isFinite(hpMax) && hpMax > 0) {
    const pct = Math.max(0, Math.min(100, Math.round((hp / hpMax) * 100)));
    hpFill.style.width = pct + "%";
  } else {
    hpFill.style.width = "0%";
  }
}

// ✅ ICI : on branche les listeners UNE SEULE FOIS (pas dans loadTokenToModal)
mHp.addEventListener("input", updateHpBar);
mHpMax.addEventListener("input", updateHpBar);

async function loadTokenToModal(tokenId){
  openedTokenId = tokenId;
  mInfo.textContent = "Chargement…";
  openModal();

  const ref = doc(db, "rooms", roomId, "tokens", tokenId);
  const snap = await getDoc(ref);

  if (!snap.exists()){
    mInfo.textContent = "Token introuvable.";
    return;
  }

  const t = snap.data();
  mTitle.textContent = t.name ? `Fiche : ${t.name}` : `Fiche : ${tokenId}`;

  mName.value   = t.name ?? "";
  mHp.value     = (t.hp ?? "");
  mHp.value     = (t.hp ?? "");
mHpTemp.value = (t.hpTemp ?? "");
mHpMax.value  = (t.hpMax ?? "");
  mHpMax.value  = (t.hpMax ?? "");
  mAc.value     = (t.ac ?? "");
  mStatus.value = Array.isArray(t.status) ? t.status.join(", ") : (t.status ?? "");
  mNotes.value  = t.notes ?? "";

  // Caracs (objet)
const a = t.abilities || {};
mStr.value = a.str ?? "";
mDex.value = a.dex ?? "";
mCon.value = a.con ?? "";
mInt.value = a.int ?? "";
mWis.value = a.wis ?? "";
mCha.value = a.cha ?? "";

// Skills (objet de bool)
const s = t.skills || {};
mSkillAcro.checked = !!s.acrobatics;
mSkillAnim.checked = !!s.animalHandling;
mSkillArca.checked = !!s.arcana;
mSkillAthl.checked = !!s.athletics;
mSkillDece.checked = !!s.deception;
mSkillHist.checked = !!s.history;
mSkillInsi.checked = !!s.insight;
mSkillInti.checked = !!s.intimidation;
mSkillInve.checked = !!s.investigation;
mSkillMedi.checked = !!s.medicine;
mSkillNatu.checked = !!s.nature;
mSkillPerc.checked = !!s.perception;
mSkillPers.checked = !!s.persuasion;
mSkillReli.checked = !!s.religion;
mSkillSlei.checked = !!s.sleightOfHand;
mSkillStea.checked = !!s.stealth;
mSkillSurv.checked = !!s.survival;
mSkillPerf.checked = !!s.performance;

  // ✅ on met à jour la barre APRES avoir rempli les champs
  updateHpBar();

  const canEdit = IS_MJ;
  [mName,mHp,mHpMax,mAc,mStatus,mNotes,mSave].forEach(el => el.disabled = !canEdit);
  mInfo.textContent = canEdit ? "Modifiable (MJ)" : "Lecture seule";
}

mSave.addEventListener("click", async () => {
  if (!IS_MJ) return;
  if (!openedTokenId) return;

  const ref = doc(db, "rooms", roomId, "tokens", openedTokenId);

  const hp = Number(mHp.value) + Number(mHpTemp.value || 0);
  const hpMax = mHpMax.value === "" ? null : Number(mHpMax.value);
  const ac = mAc.value === "" ? null : Number(mAc.value);

  try {
    await updateDoc(ref, {
      name: (mName.value || "").trim(),
      hp: Number.isFinite(hp) ? hp : null,
      hpTemp: mHpTemp.value === "" ? null : Number(mHpTemp.value),
      hpMax: Number.isFinite(hpMax) ? hpMax : null,
      ac: Number.isFinite(ac) ? ac : null,
      status: parseStatus(mStatus.value),
      notes: (mNotes.value || "").trim(),
      updatedAt: serverTimestamp(),
      abilities: {
  str: mStr.value === "" ? null : Number(mStr.value),
  dex: mDex.value === "" ? null : Number(mDex.value),
  con: mCon.value === "" ? null : Number(mCon.value),
  int: mInt.value === "" ? null : Number(mInt.value),
  wis: mWis.value === "" ? null : Number(mWis.value),
  cha: mCha.value === "" ? null : Number(mCha.value),
},

skills: {
  acrobatics: mSkillAcro.checked,
  animalHandling: mSkillAnim.checked,
  arcana: mSkillArca.checked,
  athletics: mSkillAthl.checked,
  deception: mSkillDece.checked,
  history: mSkillHist.checked,
  insight: mSkillInsi.checked,
  intimidation: mSkillInti.checked,
  investigation: mSkillInve.checked,
  medicine: mSkillMedi.checked,
  nature: mSkillNatu.checked,
  perception: mSkillPerc.checked,
  persuasion: mSkillPers.checked,
  religion: mSkillReli.checked,
  sleightOfHand: mSkillSlei.checked,
  stealth: mSkillStea.checked,
  survival: mSkillSurv.checked,
  performance: mSkillPerf.checked,
},
    });
    mInfo.textContent = "✅ Enregistré";
  } catch (err) {
    console.error(err);
    mInfo.textContent = "❌ Erreur (permissions Firestore ?)";
  }
});

// 🔥 Collection de tokens (un doc = un token)
const tokensCol = collection(db, "rooms", roomId, "tokens");

// Pour gérer le drag
let activeEl = null;
let activeId = null;
let dx = 0, dy = 0;

// Crée un élément token HTML
function createTokenElement(id, data){
  const el = document.createElement("div");
  el.className = "token " + (data.type === "pnj" ? "pnj" : "pj1"); // couleur fallback
  el.dataset.id = id;
  el.style.left = (data.x ?? 0) + "px";
  el.style.top  = (data.y ?? 0) + "px";

  if (data.img) el.style.backgroundImage = `url('${data.img}')`;
  el.textContent = data.name || id;

  // 🧲 Drag souris
  el.addEventListener("mousedown", (e) => {
    activeEl = el;
    activeId = id;
    dx = e.offsetX;
    dy = e.offsetY;
  });

  // 🧲 Drag tactile
  el.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    const rect = el.getBoundingClientRect();
    activeEl = el;
    activeId = id;
    dx = touch.clientX - rect.left;
    dy = touch.clientY - rect.top;
  }, { passive: true });

  // Bouton suppression (MJ seulement si tu veux)
  // (si tu veux que tout le monde puisse supprimer, enlève la condition IS_MJ)
  if (IS_MJ) {
    el.addEventListener("dblclick", async () => {   
      if (confirm("Supprimer ce token ?")) {
        await deleteDoc(doc(db, "rooms", roomId, "tokens", id));
      }
    });
  }
// 📝 F + clic = ouvrir la fiche
el.addEventListener("click", (e) => {
  if (!isFPressed) return;   // ⛔ sans F, rien ne se passe

  e.stopPropagation();      // évite effets de bord
  loadTokenToModal(id);
});
  return el;
}

// Clamp dans le board
function clampPosition(el, x, y){
  const maxX = board.clientWidth - el.offsetWidth;
  const maxY = board.clientHeight - el.offsetHeight;
  x = Math.max(0, Math.min(x, maxX));
  y = Math.max(0, Math.min(y, maxY));
  return {x, y};
}

// Écoute temps réel : on “redessine” la liste
onSnapshot(tokensCol, (snap) => {
  board.querySelectorAll(".token").forEach(t => t.remove());

  snap.forEach((docSnap) => {
    const id = docSnap.id;
    const data = docSnap.data();

    const el = createTokenElement(id, data);
    if (activeId === id) return;

    board.appendChild(el);
  });
});

// ===== Étape 5 : Ajout de token via le panneau (MJ ONLY) =====
const tName = document.getElementById("tName");
const tImg  = document.getElementById("tImg");
const tType = document.getElementById("tType");
const addBtn = document.getElementById("addToken");

addBtn.addEventListener("click", async () => {
  if (!IS_MJ) return;

  const name = (tName.value || "").trim() || "TOKEN";
  const img  = (tImg.value  || "").trim();
  const type = tType.value;

  const x = Math.floor(board.clientWidth / 2) - 25;
  const y = Math.floor(board.clientHeight / 2) - 25;

  try {
    await addDoc(tokensCol, {
      name,
      img,
      type,
      x,
      y,
      createdAt: serverTimestamp(),
    });

    tName.value = "";
    tImg.value = "";
    tName.focus();
  } catch (err) {
    console.error("Erreur addDoc token:", err);
    alert("Impossible d'ajouter le token (permissions Firestore ?)");
  }
});

// Déplacement souris
document.addEventListener("mousemove", (e) => {
  if (!activeEl) return;
  const r = board.getBoundingClientRect();
  let x = e.clientX - r.left - dx;
  let y = e.clientY - r.top  - dy;
  const p = clampPosition(activeEl, x, y);
  activeEl.style.left = p.x + "px";
  activeEl.style.top  = p.y + "px";
});

document.addEventListener("mouseup", async () => {
  if (!activeEl) return;
  const id = activeId;
  const el = activeEl;

  activeEl = null;
  activeId = null;

  const x = parseInt(el.style.left || "0", 10);
  const y = parseInt(el.style.top  || "0", 10);

  await updateDoc(doc(db, "rooms", roomId, "tokens", id), { x, y });
});

// Déplacement tactile
document.addEventListener("touchmove", (e) => {
  if (!activeEl) return;
  const touch = e.touches[0];
  const r = board.getBoundingClientRect();
  let x = touch.clientX - r.left - dx;
  let y = touch.clientY - r.top  - dy;
  const p = clampPosition(activeEl, x, y);
  activeEl.style.left = p.x + "px";
  activeEl.style.top  = p.y + "px";
}, { passive: true });

document.addEventListener("touchend", async () => {
  if (!activeEl) return;
  const id = activeId;
  const el = activeEl;

  activeEl = null;
  activeId = null;

  const x = parseInt(el.style.left || "0", 10);
  const y = parseInt(el.style.top  || "0", 10);

  await updateDoc(doc(db, "rooms", roomId, "tokens", id), { x, y });
}, { passive: true });
    
    const diceRef = doc(db, "rooms", roomId, "sync", "dice");
    

// ===== D20 synchronisé + cooldown partagé =====
const rollBtn = document.getElementById("rollD20");
const diceRes = document.getElementById("diceResult");
const diceMsg = document.getElementById("diceMsg");

const COOLDOWN_MS = 5000;
let lastRollId = null;

const clientId = localStorage.getItem("battlemap_clientId") || (() => {
  const id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
  localStorage.setItem("battlemap_clientId", id);
  return id;
})();

function showMsg(txt){
  if (diceMsg) diceMsg.textContent = txt || "";
}

function randIntCrypto(min, max) {
  const range = max - min + 1;
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return min + (arr[0] % range);
}

function playRollAnimation(finalValue) {
  rollBtn.disabled = true;
  rollBtn.classList.add("rolling");
  diceRes.textContent = "…";

  const start = Date.now();
  const duration = 900;
  const ticker = setInterval(() => {
    diceRes.textContent = randIntCrypto(1, 20);
    if (Date.now() - start > duration) {
      clearInterval(ticker);
      rollBtn.classList.remove("rolling");
      diceRes.textContent = String(finalValue);
      rollBtn.disabled = false;
    }
  }, 60);
}

// écoute Firestore : tout le monde voit le même résultat
onSnapshot(diceRef, (snap) => {
  const data = snap.data();
  if (!data || data.type !== "d20") return;
  if (!data.rollId || data.rollId === lastRollId) return;

  lastRollId = data.rollId;

  const v = Number(data.value);
  if (!Number.isFinite(v) || v < 1 || v > 20) return;

  showMsg("");
  playRollAnimation(v);
});

// clic = tente un nouveau jet (verrou 5s partagé)
rollBtn.addEventListener("click", async () => {
  if (rollBtn.disabled) return;

  showMsg("");

  const value = randIntCrypto(1, 20);
  const rollId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());

  try {
    await runTransaction(db, async (tx) => {
      const snap = await tx.get(diceRef);
      const data = snap.exists() ? snap.data() : null;

      const now = Date.now();
      const lastRollMs = data && Number.isFinite(Number(data.lastRollMs)) ? Number(data.lastRollMs) : 0;

      if (now - lastRollMs < COOLDOWN_MS) {
        const remain = Math.ceil((COOLDOWN_MS - (now - lastRollMs)) / 1000);
        throw new Error("COOLDOWN_" + remain);
      }

      tx.set(diceRef, {
        type: "d20",
        value,
        rollId,
        by: clientId,
        lastRollMs: now,
        at: serverTimestamp(),
      }, { merge: true });
    });
  } catch (err) {
    const msg = String(err?.message || err);

    if (msg.startsWith("COOLDOWN_")) {
      const remain = msg.split("_")[1] || "5";
      showMsg(`⏳ Cooldown : attends encore ${remain}s`);
    } else {
      showMsg("❌ Erreur de lancer (permissions / réseau ?)");
      console.error(err);
    }
  }
});
