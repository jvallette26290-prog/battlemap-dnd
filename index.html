<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Battlemap D&D</title>

  <style>
    body { margin:0; background:#111; color:#eee; font-family: Arial, sans-serif; }
/* ✅ Empêche les inputs de déborder (padding + border inclus dans width) */
*, *::before, *::after{
  box-sizing: border-box;
}
    /* Zone map */
    #board{
      width: 800px;
      height: 600px;
      background: url("map2.png") center/cover no-repeat;
      position: relative;
      margin: 20px auto;
      border: 2px solid #333;
      overflow: hidden; /* évite de “perdre” les tokens hors cadre */
    }

#dicePanel{
  width: 1000px;
  margin: 10px auto 30px;
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
}

#rollD20{
  padding: 10px 16px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #222;
  color: #eee;
  cursor: pointer;
}

#rollD20:active{
  transform: scale(0.98);
}

#diceResult{
  width: 80px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 20px;
  border: 1px solid #333;
  border-radius: 10px;
  background: #151515;
}
    
#diceMsg{
  min-width: 220px;
  font-size: 13px;
  color: #bbb;
  text-align: left;
}

#tokenPanel{
  width: 1200px;
  margin: 10px auto 30px;
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
}

#tokenPanel input, #tokenPanel select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #333;
  background:#151515;
  color:#eee;
}

#addToken{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #333;
  background:#222;
  color:#eee;
  cursor:pointer;
}    
    
/* Animation “ça tourne” */
.rolling{
  animation: spin 0.6s linear infinite;
}

@keyframes spin{
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}
    
    /* Tokens */
    .token{
      width: 50px;
      height: 50px;
      border-radius: 50%;
      position: absolute;
      z-index: 10;
      cursor: grab;

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      border: 2px solid white;
      box-shadow: 0 0 6px rgba(0,0,0,0.6);

      display: flex;
      align-items: flex-end;
      justify-content: center;

      color: white;
      font-size: 11px;
      font-weight: bold;
      text-shadow: 0 0 4px black;
      padding-bottom: 2px;
      user-select: none;
    }
     .token > div{
  width: 100%;
  padding: 0 2px;
}
.token > div > div:first-child{
  background: rgba(0,0,0,0.35);
  border-radius: 6px;
  padding: 0 3px;
  display: inline-block;
}
.token > div > div:last-child{
  margin-top: 2px;
  background: rgba(0,0,0,0.25);
  border-radius: 6px;
  padding: 0 3px;
  display: inline-block;
}
    .token:active { cursor: grabbing; }

    /* Couleurs si pas d'image */
    .pj1 { background-color:#3498db; }
    .pj2 { background-color:#2ecc71; }
    .pj3 { background-color:#e67e22; }
    .pnj { background-color:#e74c3c; }

    /* ===== Modal fiche token ===== */
/* ===== Modal fiche token (Premium Glass) ===== */
.modalHidden{ display:none !important; }

/* ===== Modal plein écran ===== */
#tokenModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display:flex;
  align-items: stretch;     /* ✅ prend toute la hauteur */
  justify-content: center;
  z-index: 9999;
  padding: 16px;
}

/* La "carte" prend (presque) tout l'écran */
.modalCard{
  width: min(1400px, calc(100vw - 24px));  /* ✅ largeur confortable, mais responsive */
  height: 100%;             /* ✅ plein écran */
  max-height: 100%;
  background: linear-gradient(180deg, rgba(30,30,30,0.92), rgba(16,16,16,0.92));
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px;
  box-shadow:
    0 30px 90px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.06);

  display: flex;            /* ✅ permet header / body / footer */
  flex-direction: column;
  overflow: hidden;         /* ✅ pas de débordement */
}

.modalHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;

  padding: 14px 14px 0 14px; /* espace intérieur */
  margin-bottom: 12px;       /* espace avec le contenu */
}

#mTitle{
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 0.2px;
}

#mClose{
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color:#eee;
  border-radius: 12px;
  width: 36px;
  height: 36px;
  cursor:pointer;
}
#mClose:hover{ background: rgba(255,255,255,0.10); }

.modalGrid{
  display:grid;
  grid-template-columns: 84px 1fr;
  gap: 10px 12px;
  align-items:start;
}

/* ✅ zone centrale scrollable */
.modalBody{
  padding: 14px;
  overflow: auto;       /* ✅ scroll */
  flex: 1;              /* ✅ prend toute la place entre header et footer */
}

.modalGrid label{
  color: rgba(255,255,255,0.72);
  font-size: 12px;
  padding-top: 10px;
}

.modalGrid input, .modalGrid textarea{
  width: 100%;
  max-width: 100%;
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
  outline: none;
}
    
.modalGrid input:focus, .modalGrid textarea:focus{
  border-color: rgba(120,180,255,0.55);
  box-shadow: 0 0 0 4px rgba(120,180,255,0.12);
}

.row2{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

/* ===== Ligne PV (3 champs) ===== */
.hpRow{
  display: grid;
  grid-template-columns:
    auto 70px
    auto 70px
    auto 70px;
  align-items: center;
  gap: 8px 10px;
}

.hpRow span{
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.hpRow input{
  width: 100%;
  text-align: center;
}

 /* ===== Jets contre la mort ===== */
.deathSaves{
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 10px 12px;
}

.dsLine{
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0;
  flex-wrap: wrap;
}

.dsLabel{
  min-width: 70px;
  font-size: 12px;
  color: rgba(255,255,255,0.80);
  font-weight: 800;
}

.dsLabel.ok{ color: rgba(140,255,190,0.95); }
.dsLabel.bad{ color: rgba(255,160,160,0.95); }

.dsChk{
  display:flex;
  align-items:center;
  gap:6px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  padding: 6px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03);
}

.dsChk input{
  width: 16px;
  height: 16px;
}   
    
.modalFooter{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 12px;

  padding: 10px 14px 14px 14px; /* espace intérieur */
  margin-top: 0;
  border-top: 1px solid rgba(255,255,255,0.08);
}

    /* ===== Caracs / Skills ===== */
.statGrid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}
.statItem{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}
.statItem span{
  width:38px;
  font-weight:800;
  font-size:12px;
  color: rgba(255,255,255,0.8);
}
.statItem input{
  width:100%;
}

.skillGrid{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap:8px 10px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}

.skillRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.skillVal{
  width:72px;
  min-width:72px;
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
  text-align:center;
}
 
.chk{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color: rgba(255,255,255,0.85);
}
.chk input{
  width:16px;
  height:16px;
}

/* Ligne Maîtrise / Vitesse / Inspiration (sur une seule ligne) */
.tripleLine{
  display: grid;
  grid-template-columns: auto 70px auto 70px auto 70px;
  gap: 10px;
  align-items: center;
}

.tlLbl{
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.tlVal{
  width: 100%;
  text-align: center;
}

.tlChk{
  width: 16px;
  height: 16px;
}

/* Ligne Progression : XP et Dés de vie plus larges */
.tripleLineWide{
  display: grid;
  grid-template-columns:
    auto 70px      /* Niveau */
    auto 110px     /* XP (plus large) */
    auto 110px;    /* Dés de vie (plus large) */
  gap: 10px;
  align-items: center;
}

/* ===== Modal : layout 2 colonnes ===== */
.modalBody{
  padding: 14px;
  overflow: hidden;   /* on évite le scroll global */
  flex: 1;
}

/* conteneur 2 colonnes */
.modalSplit{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  height: 100%;
  min-height: 0;
}

/* chaque colonne scroll indépendamment */
.col{
  overflow: auto;
  min-height: 0;
  padding-right: 6px; /* petit confort scrollbar */
}

/* dans les colonnes : la grille label/champ reste comme avant */
.col .modalGrid{
  display: grid;
  grid-template-columns: 84px 1fr;
  gap: 10px 12px;
  align-items: start;
}

/* bloc compétences (pour qu'il prenne toute la largeur de sa colonne) */
.colRight .skillGrid{
  grid-column: 1 / -1;
}

/* optionnel : rendre les labels un poil plus serrés */
.col .modalGrid label{
  padding-top: 8px;
}    

/* ===== Caracs améliorées : Score / Mod / JS ===== */
.abilityBlock{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.abilityRow{
  display:grid;
  grid-template-columns: 54px 1fr;
  gap:10px;
  align-items:center;
  padding:10px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}

.abilityName{
  font-weight:900;
  text-align:center;
  opacity:.9;
}

.abilityFields{
  display:grid;
  grid-template-columns: repeat(3, 1fr) auto;
  gap:10px;
  align-items:end;
  min-width:0;
}

.af{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
}

.afLbl{
  font-size:11px;
  color: rgba(255,255,255,0.70);
}

.abilityFields input[type="number"],
.abilityFields input[type="text"]{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
}

.abilityFields input[readonly]{
  opacity: .92;
}

.afChk{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
  user-select:none;
  padding-bottom: 8px;
}

.afChk input{
  width:16px;
  height:16px;
}    
#mAuto{
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color:#fff;
  cursor:pointer;
  font-weight: 800;
}
#mAuto:hover{ background: rgba(255,255,255,0.12); }    
    

#mInfo{
  font-size: 12px;
  color: rgba(255,255,255,0.65);
}

#mSave{
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(120,180,255,0.55);
  background: rgba(120,180,255,0.18);
  color:#fff;
  cursor:pointer;
  font-weight: 800;
}
#mSave:hover{
  background: rgba(120,180,255,0.26);
}

/* ===== Barre PV ===== */

  </style>
</head>

<body>

  <div id="board"> 
  </div>

<div id="dicePanel">
  <button id="rollD20" title="Lancer un D20">🎲 D20</button>
  <div id="diceResult">—</div>
  <div id="diceMsg"></div>
</div>

  <div id="tokenPanel">
  <input id="tName" placeholder="Nom (ex: GOBELIN)" />
  <input id="tImg" placeholder="Image (ex: gob.png ou URL)" />
  <select id="tType">
    <option value="pj">PJ</option>
    <option value="pnj">PNJ</option>
  </select>
  <button id="addToken">+ Ajouter token</button>
</div>
  
<div id="tokenModal" class="modalHidden">
  <div class="modalCard">

    <div class="modalHeader">
      <div id="mTitle">Fiche token</div>
      <button id="mClose">✕</button>
    </div>

    <div class="modalBody">
      <div class="modalSplit">

        <div class="col colLeft">
          <div class="modalGrid" id="leftGrid">

            <label>Identité</label>
            <div class="row2">
              <input id="mName" placeholder="Nom" />
              <input id="mClass" placeholder="Classe" />
              <input id="mSubClass" placeholder="Sous-classe" />
              <input id="mRace" placeholder="Race" />
            </div>

            <label>Progression</label>
            <div class="tripleLineWide">
              <span class="tlLbl">Niveau</span>
              <input id="mLevel" class="tlVal" type="number" min="1" max="20" />

              <span class="tlLbl">XP</span>
              <input id="mXp" class="tlVal" type="number" min="0" />

              <span class="tlLbl">Dés de vie</span>
              <input id="mHitDice" class="tlVal" type="text" placeholder="ex: 5d8" />
            </div>

            <label>PV</label>
            <div class="hpRow">
              <span>Actuels</span>
              <input id="mHp" type="number" min="0" />

              <span>Temp.</span>
              <input id="mHpTemp" type="number" min="0" />

              <span>Max</span>
              <input id="mHpMax" type="number" min="0" />
            </div>

            <label>CA</label>
            <input id="mAc" type="number" min="0" />

            <label>Maîtrise</label>
            <div class="tripleLine">
              <span class="tlLbl">Maîtrise</span>
              <input id="mProf" class="tlVal" type="text" inputmode="numeric" placeholder="2" />

              <span class="tlLbl">Vitesse</span>
              <input id="mSpeed" class="tlVal" type="number" min="0" placeholder="9" />

              <span class="tlLbl">Inspiration</span>
              <input id="mInsp" class="tlVal" type="number" min="0" value="0" />
            </div>

             <!-- ===== D&D : Jets contre la mort ===== -->
<label>Jets contre la mort</label>

<div class="deathSaves">
  <div class="dsLine">
    <span class="dsLabel ok">Succès</span>
    <label class="dsChk"><input id="mDsS1" type="checkbox">1</label>
    <label class="dsChk"><input id="mDsS2" type="checkbox">2</label>
    <label class="dsChk"><input id="mDsS3" type="checkbox">3</label>
  </div>

  <div class="dsLine">
    <span class="dsLabel bad">Échec</span>
    <label class="dsChk"><input id="mDsF1" type="checkbox">1</label>
    <label class="dsChk"><input id="mDsF2" type="checkbox">2</label>
    <label class="dsChk"><input id="mDsF3" type="checkbox">3</label>
  </div>
</div>
            
            <label>Caracs</label>

<div class="abilityBlock">

  <!-- FOR -->
  <div class="abilityRow">
    <div class="abilityName">FOR</div>

    <div class="abilityFields">
      <div class="af">
        <div class="afLbl">Score</div>
        <input id="mStr" type="number" min="1" max="30">
      </div>

      <div class="af">
        <div class="afLbl">Mod</div>
        <input id="mStrMod" type="text" readonly>
      </div>

      <div class="af">
        <div class="afLbl">JS</div>
        <input id="mStrSave" type="text" readonly>
      </div>

      <label class="afChk">
        <input id="mStrSaveProf" type="checkbox">
        Maîtrise
      </label>
    </div>
  </div>

  <!-- DEX -->
  <div class="abilityRow">
    <div class="abilityName">DEX</div>
    <div class="abilityFields">
      <div class="af"><div class="afLbl">Score</div><input id="mDex" type="number" min="1" max="30"></div>
      <div class="af"><div class="afLbl">Mod</div><input id="mDexMod" type="text" readonly></div>
      <div class="af"><div class="afLbl">JS</div><input id="mDexSave" type="text" readonly></div>
      <label class="afChk"><input id="mDexSaveProf" type="checkbox"> Maîtrise</label>

  </div>

  <!-- CON -->
  <div class="abilityRow">
    <div class="abilityName">CON</div>
    <div class="abilityFields">
      <div class="af"><div class="afLbl">Score</div><input id="mCon" type="number" min="1" max="30"></div>
      <div class="af"><div class="afLbl">Mod</div><input id="mConMod" type="text" readonly></div>
      <div class="af"><div class="afLbl">JS</div><input id="mConSave" type="text" readonly></div>
      <label class="afChk"><input id="mConSaveProf" type="checkbox"> Maîtrise</label>
    </div>
  </div>

  <!-- INT -->
  <div class="abilityRow">
    <div class="abilityName">INT</div>
    <div class="abilityFields">
      <div class="af"><div class="afLbl">Score</div><input id="mInt" type="number" min="1" max="30"></div>
      <div class="af"><div class="afLbl">Mod</div><input id="mIntMod" type="text" readonly></div>
      <div class="af"><div class="afLbl">JS</div><input id="mIntSave" type="text" readonly></div>
      <label class="afChk"><input id="mIntSaveProf" type="checkbox"> Maîtrise</label>
    </div>
  </div>

  <!-- SAG -->
  <div class="abilityRow">
    <div class="abilityName">SAG</div>
    <div class="abilityFields">
      <div class="af"><div class="afLbl">Score</div><input id="mWis" type="number" min="1" max="30"></div>
      <div class="af"><div class="afLbl">Mod</div><input id="mWisMod" type="text" readonly></div>
      <div class="af"><div class="afLbl">JS</div><input id="mWisSave" type="text" readonly></div>
      <label class="afChk"><input id="mWisSaveProf" type="checkbox"> Maîtrise</label>
    </div>
  </div>

  <!-- CHA -->
  <div class="abilityRow">
    <div class="abilityName">CHA</div>
    <div class="abilityFields">
      <div class="af"><div class="afLbl">Score</div><input id="mCha" type="number" min="1" max="30"></div>
      <div class="af"><div class="afLbl">Mod</div><input id="mChaMod" type="text" readonly></div>
      <div class="af"><div class="afLbl">JS</div><input id="mChaSave" type="text" readonly></div>
      <label class="afChk"><input id="mChaSaveProf" type="checkbox"> Maîtrise</label>
    </div>
  </div>

</div>

        <div class="col colRight">
          <div class="modalGrid" id="rightGrid">

            <label>Comp.</label>
            <div class="skillGrid">

              <div class="skillRow">
                <label class="chk"><input id="mSkillAcro" type="checkbox"> Acrobaties</label>
                <input id="mSkillAcroVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">
              </div>

              <div class="skillRow">
                <label class="chk"><input id="mSkillAnim" type="checkbox"> Dressage</label>
                <input id="mSkillAnimVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">
              </div>

              <div class="skillRow">
                <label class="chk"><input id="mSkillArca" type="checkbox"> Arcanes</label>
                <input id="mSkillArcaVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">
              </div>

              <div class="skillRow">
                <label class="chk"><input id="mSkillAthl" type="checkbox"> Athlétisme</label>
                <input id="mSkillAthlVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">
              </div>

              <div class="skillRow">
                <label class="chk"><input id="mSkillDece" type="checkbox"> Tromperie</label>
                <input id="mSkillDeceVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">
              </div>

              <div class="skillRow">
                <label class="chk"><input id="mSkillHist" type="checkbox"> Histoire</label>
                <input id="mSkillHistVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">
              </div>

              <div class="skillRow">
                <label class="chk"><input id="mSkillInsi" type="checkbox"> Intuition</label>
                <input id="mSkillInsiVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">
              </div>

              <div class="skillRow">
                <label class="chk"><input id="mSkillInti" type="checkbox"> Intimidation</label>
                <input id="mSkillIntiVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">
              </div>

              <div class="skillRow">
                <label class="chk"><input id="mSkillInve" type="checkbox"> Investigation</label>
                <input id="mSkillInveVal" class="skillVal" type="text" inputmode="numeric" placeholder="+0">

  stealth: mSkillStea.checked,
  stealthVal: mSkillSteaVal.value === "" ? null : Number(mSkillSteaVal.value),

  // Survie (SAG)
  survival: mSkillSurv.checked,
  survivalVal: mSkillSurvVal.value === "" ? null : Number(mSkillSurvVal.value),

  // Représentation (CHA)
  performance: mSkillPerf.checked,
  performanceVal: mSkillPerfVal.value === "" ? null : Number(mSkillPerfVal.value),
},
    });
    mInfo.textContent = "✅ Enregistré";
  } catch (err) {
    console.error(err);
    mInfo.textContent = "❌ Erreur (permissions Firestore ?)";
  }
});

    

// 🔥 Collection de tokens (un doc = un token)
const tokensCol = collection(db, "rooms", roomId, "tokens");

// Pour gérer le drag
let activeEl = null;
let activeId = null;
let dx = 0, dy = 0;

// Crée un élément token HTML
function escapeHtml(str){
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
function createTokenElement(id, data){
  const el = document.createElement("div");
  el.className = "token " + (data.type === "pnj" ? "pnj" : "pj1"); // couleur fallback
  el.dataset.id = id;
  el.style.left = (data.x ?? 0) + "px";
  el.style.top  = (data.y ?? 0) + "px";

  if (data.img) el.style.backgroundImage = `url('${data.img}')`;
  const name = data.name || id;
const cls  = (data.class || "").trim();
const sub  = (data.subClass || "").trim();
const race = (data.race || "").trim();

const classLine = cls ? (sub ? `${cls} (${sub})` : cls) : "";
const line2 = [classLine, race].filter(Boolean).join(" · ");

if (cls || race) {
  // 2 lignes : Nom puis "Classe · Race"
  el.innerHTML = `
    <div style="line-height:1.05; text-align:center;">
      <div>${escapeHtml(name)}</div>
      <div style="font-size:9px; opacity:.9;">${escapeHtml(line2)}</div>
    </div>
  `;
} else {
  el.textContent = name;
}

  // 🧲 Drag souris
  el.addEventListener("mousedown", (e) => {
    activeEl = el;
    activeId = id;
    dx = e.offsetX;
    dy = e.offsetY;
  });

  // 🧲 Drag tactile
  el.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    const rect = el.getBoundingClientRect();
    activeEl = el;
    activeId = id;
    dx = touch.clientX - rect.left;
    dy = touch.clientY - rect.top;
  }, { passive: true });

  // Bouton suppression (MJ seulement si tu veux)
  // (si tu veux que tout le monde puisse supprimer, enlève la condition IS_MJ)
  if (IS_MJ) {
    el.addEventListener("dblclick", async () => {   
      if (confirm("Supprimer ce token ?")) {
        await deleteDoc(doc(db, "rooms", roomId, "tokens", id));
      }
    });
  }
// 📝 F + clic = ouvrir la fiche
el.addEventListener("click", (e) => {
  if (!isFPressed) return;   // ⛔ sans F, rien ne se passe

  e.stopPropagation();      // évite effets de bord
  loadTokenToModal(id);
});
  return el;
}

// Clamp dans le board
function clampPosition(el, x, y){
  const maxX = board.clientWidth - el.offsetWidth;
  const maxY = board.clientHeight - el.offsetHeight;
  x = Math.max(0, Math.min(x, maxX));
  y = Math.max(0, Math.min(y, maxY));
  return {x, y};
}

// Écoute temps réel : on “redessine” la liste
onSnapshot(tokensCol, (snap) => {
  // On supprime tous les tokens SAUF celui en cours de déplacement
  board.querySelectorAll(".token").forEach(t => {
    if (t.dataset.id !== activeId) t.remove();
  });

  snap.forEach((docSnap) => {
    const id = docSnap.id;
    const data = docSnap.data();

    // Si c'est le token qu'on est en train de déplacer, on le laisse tranquille
    if (id === activeId) return;

    const el = createTokenElement(id, data);
    board.appendChild(el);
  });
});

// ===== Étape 5 : Ajout de token via le panneau (MJ ONLY) =====
const tName = document.getElementById("tName");
const tImg  = document.getElementById("tImg");
const tType = document.getElementById("tType");
const addBtn = document.getElementById("addToken");

addBtn.addEventListener("click", async () => {
  if (!IS_MJ) return;

  const name = (tName.value || "").trim() || "TOKEN";
  const img  = (tImg.value  || "").trim();
  const type = tType.value;

  const x = Math.floor(board.clientWidth / 2) - 25;
  const y = Math.floor(board.clientHeight / 2) - 25;

  try {
    await addDoc(tokensCol, {
      name,
      img,
      type,
      x,
      y,
      createdAt: serverTimestamp(),
    });

    tName.value = "";
    tImg.value = "";
    tName.focus();
  } catch (err) {
    console.error("Erreur addDoc token:", err);
    alert("Impossible d'ajouter le token (permissions Firestore ?)");
  }
});

// Déplacement souris
document.addEventListener("mousemove", (e) => {
  if (!activeEl) return;
  const r = board.getBoundingClientRect();
  let x = e.clientX - r.left - dx;
  let y = e.clientY - r.top  - dy;
  const p = clampPosition(activeEl, x, y);
  activeEl.style.left = p.x + "px";
  activeEl.style.top  = p.y + "px";
});

document.addEventListener("mouseup", async () => {
  if (!activeEl) return;
  const id = activeId;
  const el = activeEl;

  activeEl = null;
  activeId = null;

  const x = parseInt(el.style.left || "0", 10);
  const y = parseInt(el.style.top  || "0", 10);

  await updateDoc(doc(db, "rooms", roomId, "tokens", id), { x, y });
});

// Déplacement tactile
document.addEventListener("touchmove", (e) => {
  if (!activeEl) return;
  const touch = e.touches[0];
  const r = board.getBoundingClientRect();
  let x = touch.clientX - r.left - dx;
  let y = touch.clientY - r.top  - dy;
  const p = clampPosition(activeEl, x, y);
  activeEl.style.left = p.x + "px";
  activeEl.style.top  = p.y + "px";
}, { passive: true });

document.addEventListener("touchend", async () => {
  if (!activeEl) return;
  const id = activeId;
  const el = activeEl;

  activeEl = null;
  activeId = null;

  const x = parseInt(el.style.left || "0", 10);
  const y = parseInt(el.style.top  || "0", 10);

  await updateDoc(doc(db, "rooms", roomId, "tokens", id), { x, y });
}, { passive: true });
    
    const diceRef = doc(db, "rooms", roomId, "sync", "dice");
    

// ===== D20 synchronisé + cooldown partagé =====
const rollBtn = document.getElementById("rollD20");
const diceRes = document.getElementById("diceResult");
const diceMsg = document.getElementById("diceMsg");

const COOLDOWN_MS = 5000;
let lastRollId = null;

const clientId = localStorage.getItem("battlemap_clientId") || (() => {
  const id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
  localStorage.setItem("battlemap_clientId", id);
  return id;
})();

function showMsg(txt){
  if (diceMsg) diceMsg.textContent = txt || "";
}

function randIntCrypto(min, max) {
  const range = max - min + 1;
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return min + (arr[0] % range);
}

function playRollAnimation(finalValue) {
  rollBtn.disabled = true;
  rollBtn.classList.add("rolling");
  diceRes.textContent = "…";

  const start = Date.now();
  const duration = 900;
  const ticker = setInterval(() => {
    diceRes.textContent = randIntCrypto(1, 20);
    if (Date.now() - start > duration) {
      clearInterval(ticker);
      rollBtn.classList.remove("rolling");
      diceRes.textContent = String(finalValue);
      rollBtn.disabled = false;
    }
  }, 60);
}

// écoute Firestore : tout le monde voit le même résultat
onSnapshot(diceRef, (snap) => {
  const data = snap.data();
  if (!data || data.type !== "d20") return;
  if (!data.rollId || data.rollId === lastRollId) return;

  lastRollId = data.rollId;

  const v = Number(data.value);
  if (!Number.isFinite(v) || v < 1 || v > 20) return;

  showMsg("");
  playRollAnimation(v);
});

// clic = tente un nouveau jet (verrou 5s partagé)
rollBtn.addEventListener("click", async () => {
  if (rollBtn.disabled) return;

  showMsg("");

  const value = randIntCrypto(1, 20);
  const rollId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());

  try {
    await runTransaction(db, async (tx) => {
      const snap = await tx.get(diceRef);
      const data = snap.exists() ? snap.data() : null;

      const now = Date.now();
      const lastRollMs = data && Number.isFinite(Number(data.lastRollMs)) ? Number(data.lastRollMs) : 0;

      if (now - lastRollMs < COOLDOWN_MS) {
        const remain = Math.ceil((COOLDOWN_MS - (now - lastRollMs)) / 1000);
        throw new Error("COOLDOWN_" + remain);
      }

      tx.set(diceRef, {
        type: "d20",
        value,
        rollId,
        by: clientId,
        lastRollMs: now,
        at: serverTimestamp(),
      }, { merge: true });
    });
  } catch (err) {
    const msg = String(err?.message || err);

    if (msg.startsWith("COOLDOWN_")) {
      const remain = msg.split("_")[1] || "5";
      showMsg(`⏳ Cooldown : attends encore ${remain}s`);
    } else {
      showMsg("❌ Erreur de lancer (permissions / réseau ?)");
      console.error(err);
    }
  }
});
  </script>
