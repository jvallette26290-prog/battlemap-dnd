<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Battlemap D&D</title>

  <style>
    body { margin:0; background:#111; color:#eee; font-family: Arial, sans-serif; }
/* ✅ Empêche les inputs de déborder (padding + border inclus dans width) */
*, *::before, *::after{
  box-sizing: border-box;
}

#board{
  width: 80vw;                 /* largeur adaptable */
  max-width: 1200px;           /* limite PJ */
  aspect-ratio: 4 / 3;         /* ✅ RATIO MAGIQUE */
  
  background: center / cover no-repeat;
  position: relative;
  margin: 20px auto;
  border: 2px solid #333;
  overflow: hidden;
}
/* ✅ Taille MJ : plus petit (pour laisser de la place autour) */
body.is-mj #board{
  width: 800px;
  height: 550px;
}

#dicePanel{
  width: 1000px;
  margin: 10px auto 30px;
  display: flex;
  gap: 40px;
  align-items: center;
  justify-content: center;
}

#mapPanel{
  width: 1000px;
  margin: 10px auto 10px;
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: center;
}

#mapPanel .mapBtn{
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #222;
  color: #eee;
  cursor: pointer;
}

#mapPanel .mapBtn:active{
  transform: scale(0.98);
}   
    


#diceResult{
  width: 80px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 20px;
  border: 1px solid #333;
  border-radius: 10px;
  background: #151515;
}
    
#diceMsg{
  min-width: 220px;
  font-size: 13px;
  color: #bbb;
  text-align: left;
}

#tokenPanel{
  width: 1200px;
  margin: 10px auto 30px;
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
}

#tokenPanel input, #tokenPanel select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #333;
  background:#151515;
  color:#eee;
}

#addToken{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #333;
  background:#222;
  color:#eee;
  cursor:pointer;
}    
    
/* Animation “ça tourne” */

@keyframes spin{
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}
    
    /* Tokens */
    .token{
  z-index: 10;
  border-radius: 0;

  /* HEXAGONE "flat-top" (haut plat) */
  clip-path: polygon(
    25% 6.7%,
    75% 6.7%,
    100% 50%,
    75% 93.3%,
    25% 93.3%,
    0% 50%
  );

  /* garde tes styles */
  position: absolute;
  z-index: 10;
  cursor: grab;

  background-size: 130%;
  background-position: center;
  background-repeat: no-repeat;

  border: 2px solid white;
  box-shadow: 0 0 6px rgba(0,0,0,0.6);

  display: flex;
  align-items: flex-end;
  justify-content: center;

  color: white;
  font-size: 11px;
  font-weight: bold;
  text-shadow: 0 0 4px black;
  padding-bottom: 2px;
  user-select: none;
}
     .token > div{
  width: 100%;
  padding: 0 2px;
}
.token > div > div:first-child{
  background: rgba(0,0,0,0.35);
  border-radius: 6px;
  padding: 0 3px;
  display: inline-block;
}
.token > div > div:last-child{
  margin-top: 2px;
  background: rgba(0,0,0,0.25);
  border-radius: 6px;
  padding: 0 3px;
  display: inline-block;
}
    .token:active { cursor: grabbing; }

    /* Couleurs si pas d'image */
    .pj1 { background-color:#3498db; }
    .pj2 { background-color:#2ecc71; }
    .pj3 { background-color:#e67e22; }
    .pnj { background-color:#e74c3c; }

    /* ===== Modal fiche token ===== */
/* ===== Modal fiche token (Premium Glass) ===== */
.modalHidden{ display:none !important; }
 #spellImgModal{ z-index: 10000; } /* au-dessus de la fiche F et S */
#spellImgModal img{
  max-width: 720px;     /* ← taille idéale type fiche D&D */
  width: 100%;
  height: auto;

  margin: 0 auto;       /* centre l’image */
  display: block;

  border-radius: 14px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}   

/* ===== Modal plein écran ===== */
#tokenModal, #spellModal, #spellImgModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display:flex;
  align-items: stretch;     /* ✅ prend toute la hauteur */
  justify-content: center;
  z-index: 9999;
  padding: 16px;
}

/* La "carte" prend (presque) tout l'écran */
.modalCard{
  width: min(1400px, calc(100vw - 24px));  /* ✅ largeur confortable, mais responsive */
  height: 100%;             /* ✅ plein écran */
  max-height: 100%;
  background: linear-gradient(180deg, rgba(30,30,30,0.92), rgba(16,16,16,0.92));
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px;
  box-shadow:
    0 30px 90px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.06);

  display: flex;            /* ✅ permet header / body / footer */
  flex-direction: column;
  overflow: hidden;         /* ✅ pas de débordement */
}

.modalHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;

  padding: 14px 14px 0 14px; /* espace intérieur */
  margin-bottom: 12px;       /* espace avec le contenu */
}

/* ===== Lisibilité MODAL SORTS ===== */

/* 1) Les conteneurs de boutons doivent être dans la colonne 2 (à droite) */
#spellModal .modalGrid > div[id$="Btns"]{
  grid-column: 2;
}

/* 2) Et on affiche les boutons proprement */
#spellModal .modalGrid > div[id$="Btns"]{
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 0 14px;
}

/* 3) Labels plus lisibles */
#spellModal .modalGrid label{
  font-size: 13px;
  font-weight: 800;
  opacity: 0.85;
  padding-top: 12px;
}

/* 4) Textareas plus confort */
#spellModal textarea{
  font-size: 14px;
  line-height: 1.35;
  padding: 12px 14px;
  border-radius: 14px;
}

/* 5) Boutons plus lisibles (si tu veux uniformiser sans JS) */
#spellModal .modalGrid button{
  font-size: 13px;
  padding: 8px 10px;
  border-radius: 12px;
}

#spellModal .modalGrid{
  grid-template-columns: 110px 1fr;
}   
    
#mTitle{
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 0.2px;
}

#mClose{
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color:#eee;
  border-radius: 12px;
  width: 36px;
  height: 36px;
  cursor:pointer;
}
#mClose:hover{ background: rgba(255,255,255,0.10); }

.modalGrid{
  display:grid;
  grid-template-columns: 84px 1fr;
  gap: 10px 12px;
  align-items:start;
}

/* ✅ zone centrale scrollable */
.modalBody{
  padding: 14px;
  overflow: auto;       /* ✅ scroll */
  flex: 1;              /* ✅ prend toute la place entre header et footer */
}

.modalGrid label{
  color: rgba(255,255,255,0.72);
  font-size: 12px;
  padding-top: 10px;
}

.modalGrid input, .modalGrid textarea{
  width: 100%;
  max-width: 100%;
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
  outline: none;
}
    
.modalGrid input:focus, .modalGrid textarea:focus{
  border-color: rgba(120,180,255,0.55);
  box-shadow: 0 0 0 4px rgba(120,180,255,0.12);
}

.row2{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

/* ===== Ligne PV (3 champs) ===== */
.hpRow{
  display: grid;
  grid-template-columns:
    auto 70px
    auto 70px
    auto 70px;
  align-items: center;
  gap: 8px 10px;
}

.hpRow span{
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.hpRow input{
  width: 100%;
  text-align: center;
}

 /* ===== Jets contre la mort ===== */
.deathSaves{
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 10px 12px;
}

.dsLine{
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0;
  flex-wrap: wrap;
}

.dsLabel{
  min-width: 70px;
  font-size: 12px;
  color: rgba(255,255,255,0.80);
  font-weight: 800;
}

.dsLabel.ok{ color: rgba(140,255,190,0.95); }
.dsLabel.bad{ color: rgba(255,160,160,0.95); }

.dsChk{
  display:flex;
  align-items:center;
  gap:6px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  padding: 6px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03);
}

.dsChk input{
  width: 16px;
  height: 16px;
}   
    
.modalFooter{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 12px;

  padding: 10px 14px 14px 14px; /* espace intérieur */
  margin-top: 0;
  border-top: 1px solid rgba(255,255,255,0.08);
}

    /* ===== Caracs / Skills ===== */
.statGrid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}
.statItem{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}
.statItem span{
  width:38px;
  font-weight:800;
  font-size:12px;
  color: rgba(255,255,255,0.8);
}
.statItem input{
  width:100%;
}

.skillGrid{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap:8px 10px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}

.skillRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.skillVal{
  width:72px;
  min-width:72px;
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
  text-align:center;
}
 
.chk{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color: rgba(255,255,255,0.85);
}
.chk input{
  width:16px;
  height:16px;
}

/* Ligne Maîtrise / Vitesse / Inspiration (sur une seule ligne) */
.tripleLine{
  display: grid;
  grid-template-columns: auto 70px auto 70px auto 70px;
  gap: 10px;
  align-items: center;
}

.tlLbl{
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}

.tlVal{
  width: 100%;
  text-align: center;
}

.tlChk{
  width: 16px;
  height: 16px;
}

/* Ligne Progression : XP et Dés de vie plus larges */
.tripleLineWide{
  display: grid;
  grid-template-columns:
    auto 70px      /* Niveau */
    auto 110px     /* XP (plus large) */
    auto 110px;    /* Dés de vie (plus large) */
  gap: 10px;
  align-items: center;
}

/* ===== Modal : layout 2 colonnes ===== */
.modalBody{
  padding: 14px;
  overflow: hidden;   /* on évite le scroll global */
  flex: 1;
}

/* conteneur 2 colonnes */
.modalSplit{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  height: 100%;
  min-height: 0;
}

/* chaque colonne scroll indépendamment */
.col{
  overflow: auto;
  min-height: 0;
  padding-right: 6px; /* petit confort scrollbar */
}

/* dans les colonnes : la grille label/champ reste comme avant */
.col .modalGrid{
  display: grid;
  grid-template-columns: 84px 1fr;
  gap: 10px 12px;
  align-items: start;
}

/* bloc compétences (pour qu'il prenne toute la largeur de sa colonne) */
.colRight .skillGrid{
  grid-column: 1 / -1;
}

/* optionnel : rendre les labels un poil plus serrés */
.col .modalGrid label{
  padding-top: 8px;
}    

/* ===== Caracs améliorées : Score / Mod / JS ===== */
.abilityBlock{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.abilityRow{
  display:grid;
  grid-template-columns: 54px 1fr;
  gap:10px;
  align-items:center;
  padding:10px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}

.abilityName{
  font-weight:900;
  text-align:center;
  opacity:.9;
}

.abilityFields{
  display:grid;
  grid-template-columns: repeat(3, 1fr) auto;
  gap:10px;
  align-items:end;
  min-width:0;
}

.af{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
}

.afLbl{
  font-size:11px;
  color: rgba(255,255,255,0.70);
}

.abilityFields input[type="number"],
.abilityFields input[type="text"]{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color:#eee;
}

.abilityFields input[readonly]{
  opacity: .92;
}

.afChk{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
  user-select:none;
  padding-bottom: 8px;
}

.afChk input{
  width:16px;
  height:16px;
} 

/* Boutons dés (icônes) */

.diceBtn img{
  width: 110px;
  height: 100px;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
  filter:
    drop-shadow(0 6px 14px rgba(0,0,0,0.75))
    drop-shadow(0 0 18px rgba(255,120,40,0.35));
}
.diceBtn:hover{
  background: #222;
}

.diceBtn:active{
  transform: scale(0.96);
}

.diceBtn:disabled{
  opacity: 0.6;
  cursor: not-allowed;
}
.diceBtn:hover img{
  filter:
    drop-shadow(0 0 22px rgba(255,160,60,0.55))
    drop-shadow(0 6px 14px rgba(0,0,0,0.8));
}
/* Animation : on fait tourner l’image du dé */
.diceBtn.rolling img{
  animation: spin 0.6s linear infinite;
}

/* Quand le MJ coupe la grille */
body.grid-off #gridOverlay{
  display: none;
}

/* Style du bouton toggle (MJ) */
#toggleGridBtn{
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #222;
  color: #eee;
  cursor: pointer;
}

#toggleGridBtn.active{
  border-color: rgba(120,180,255,0.55);
  background: rgba(120,180,255,0.18);
}
    
#mAuto{
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color:#fff;
  cursor:pointer;
  font-weight: 800;
}
#mAuto:hover{ background: rgba(255,255,255,0.12); }    
    

#mInfo{
  font-size: 12px;
  color: rgba(255,255,255,0.65);
}

#mSave{
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(120,180,255,0.55);
  background: rgba(120,180,255,0.18);
  color:#fff;
  cursor:pointer;
  font-weight: 800;
}
#mSave:hover{
  background: rgba(120,180,255,0.26);
}

#rollD20:disabled{
  opacity: 0.6;
  cursor: not-allowed;
}
/* ===== Grille hexagonale (overlay) ===== */
#board{ position: relative; overflow: hidden; }  /* important : pour que l'overlay se place dedans */

#gridOverlay{
  position: absolute;
  inset: 0;                 /* prend toute la surface du board */
  pointer-events: none;     /* ✅ n'empêche pas de cliquer/drag les tokens */
  opacity: 0.35;            /* transparence de la grille (ajuste si besoin) */
  background-repeat: repeat;
  z-index: 5;               /* au-dessus de la map, en-dessous des tokens (tokens z-index:10) */
}

/* ===== FICHE SORTS : côté PJ = pas de texte, seulement boutons ===== */

/* 1) PJ : on cache les textareas (le MJ garde tout visible) */
body:not(.is-mj) #spellModal textarea{
  display: none;
}

/* 2) Les containers de boutons doivent être dans la colonne de droite */
#spellModal .modalGrid > div[id$="Btns"]{
  grid-column: 2 / -1;         /* colonne 2 (à droite) */
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding-bottom: 10px;
}

/* 3) Optionnel : un peu plus de place à gauche pour les labels */
#spellModal .modalGrid{
  grid-template-columns: 110px 1fr;
}

/* ===== Boutons de sorts plus parlants ===== */
#spellModal .modalGrid button{
  display: inline-flex;
  align-items: center;
  gap: 6px;

  font-size: 14px;
  font-weight: 700;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  padding: 8px 12px;
}

#spellModal .modalGrid button:hover{
  background: rgba(255,255,255,0.14);
}

/* ===== Slots de sorts ===== */
.slotRow{
  display:flex;
  align-items:center;
  gap:10px;
  margin: 6px 0 12px;
  flex-wrap: wrap;
}

.slotLabel{
  font-size:12px;
  color: rgba(255,255,255,0.75);
  min-width: 70px;
}

.slotBoxes{
  display:flex;
  gap:6px;
  flex-wrap: wrap;
}

.slotBox{
  width: 22px;
  height: 22px;
  border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  transition: transform .05s ease;
}

.slotBox:active{ transform: scale(0.96); }

.slotBox.used{
  background: rgba(120,180,255,0.22);
  border-color: rgba(120,180,255,0.60);
}

.slotMax{
  width: 64px;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color:#eee;
}
/* ===== Emplacements de sorts : checkboxes ===== */

.slotBoxes{
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.slotChk{
  width: 20px;
  height: 20px;
  cursor: pointer;
  accent-color: rgba(120,180,255,0.9); /* couleur moderne */
}
/* PJ : on cache le champ "max" (nombre d'emplacements) */
body:not(.is-mj) .slotMax{
  display: none !important;
}
/* Alignement horizontal des emplacements */
.slotBoxes{
  display: flex;
  flex-direction: row;
  gap: 8px;
  flex-wrap: nowrap;        /* ✅ une seule ligne */
  align-items: center;
}

/* Si l’écran est trop petit, optionnel : autoriser le retour à la ligne */
@media (max-width: 900px){
  .slotBoxes{
    flex-wrap: wrap;        /* ✅ évite de sortir de l’écran */
  }
}

/* PJ : quand max est caché, on colle les checkboxes à gauche */
body:not(.is-mj) .slotRow{
  gap: 10px;
}
/* ===== Séparateurs entre niveaux de sorts ===== */
#spellModal .slotRow{
  border-bottom: 1px solid rgba(255,255,255,0.12);
  padding-bottom: 14px;
  margin-bottom: 14px;
}
/* ===== DICE UI (VTT Pro) ===== */
#dicePanel{
  width: min(1100px, calc(100vw - 24px));
  margin: 14px auto 26px;
  gap: 18px;
  padding: 12px 14px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.10);
  background: linear-gradient(180deg, rgba(25,25,25,0.92), rgba(14,14,14,0.92));
  box-shadow: 0 18px 60px rgba(0,0,0,0.55);
}

/* Boutons dés : plus “cliquables” */
.diceBtn{
  width: 44px;
  height: 44px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  transition: transform .08s ease, background .15s ease, border-color .15s ease;
}

.diceBtn:hover{
  background: rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.22);
  transform: translateY(-1px);
}

.diceBtn:active{
  transform: translateY(0px) scale(0.98);
}

/* Résultat style “card” */
#diceResult{
  width: 190px;
  height: 54px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.05);
  font-weight: 900;
  font-size: 18px;
  letter-spacing: 0.3px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
}

/* Message (nom du joueur / crit) */
#diceMsg{
  min-width: 280px;
  font-size: 13px;

/* Génère une grille hexagonale "flat-top" (hexagones à plat) */
function setHexGrid(hexSizePx = 35, stroke = "rgba(255,255,255,0.35)", strokeWidth = 1){
  const a = hexSizePx;               // côté de l'hexagone
  const h = Math.sqrt(3) * a;        // hauteur d'un hex flat-top
  const tileW = 3 * a;               // largeur de tuile pour répétition
  const tileH = 2 * h;               // hauteur de tuile pour répétition

  // points d'un hexagone flat-top centré en (cx,cy)
  const hexPath = (cx, cy) => {
    const p = [
      [cx + a,     cy],
      [cx + a/2,   cy + h/2],
      [cx - a/2,   cy + h/2],
      [cx - a,     cy],
      [cx - a/2,   cy - h/2],
      [cx + a/2,   cy - h/2],
    ];
    return "M " + p.map(pt => pt[0].toFixed(2)+","+pt[1].toFixed(2)).join(" L ") + " Z";
  };

  // On dessine plusieurs hex dans la tuile pour que la répétition soit parfaite
  const paths = [
    hexPath(a,     h/2),
    hexPath(2.5*a, h),
    hexPath(2.5*a, 0),
    hexPath(a,     1.5*h),
  ].map(d => `<path d="${d}" fill="none" stroke="${stroke}" stroke-width="${strokeWidth}"/>`).join("");

  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${tileW}" height="${tileH}" viewBox="0 0 ${tileW} ${tileH}">
      ${paths}
    </svg>
  `.trim();

  const uri = `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
  gridOverlay.style.backgroundImage = `url("${uri}")`;
  gridOverlay.style.backgroundSize = `${tileW}px ${tileH}px`;
}

// ===== SNAP HEX (flat-top) =====
function axialRound(q, r){
  // axial -> cube
  let x = q;
  let z = r;
  let y = -x - z;

  // round cube
  let rx = Math.round(x);
  let ry = Math.round(y);
  let rz = Math.round(z);

  const dx = Math.abs(rx - x);
  const dy = Math.abs(ry - y);
  const dz = Math.abs(rz - z);

  if (dx > dy && dx > dz) rx = -ry - rz;
  else if (dy > dz)        ry = -rx - rz;
  else                     rz = -rx - ry;

  // cube -> axial
  return { q: rx, r: rz };
}

// Convertit un point (px,py) -> centre du HEX le plus proche
function snapPointToHexCenter(px, py){
  const a = CURRENT_HEX_PX;            // taille "côté" hex
  const h = Math.sqrt(3) * a;          // hauteur d'un hex

  // ✅ IMPORTANT : ton overlay commence un hex centré en (a, h/2)
  const originX = a;
  const originY = h / 2;

  // translate vers origine
  const x = px - originX;
  const y = py - originY;

  // pixel -> axial (flat-top)
  const q = (2/3) * (x / a);
  const r = (-1/3) * (x / a) + (1/Math.sqrt(3)) * (y / a);

  // arrondi vers l'hex le plus proche
  const ar = axialRound(q, r);

  // axial -> pixel (centre)
  const cx = originX + (3/2) * a * ar.q;
  const cy = originY + h * (ar.r + ar.q/2);

  return { cx, cy };
}

function renderSlotRow(levelKey, slotData, canEditMax, canToggleUsed){
  const row = getSlotRow(levelKey);
  if (!row) return;

  const inputMax = row.querySelector(".slotMax");
  const boxes = row.querySelector(".slotBoxes");

  const max = Math.max(0, Number(slotData?.max ?? 0));
  const used = Math.max(0, Math.min(max, Number(slotData?.used ?? 0)));

  inputMax.value = String(max);
  inputMax.disabled = !canEditMax;

  boxes.innerHTML = "";

  for (let i = 1; i <= max; i++){
    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.className = "slotChk";
    chk.checked = i <= used;

    chk.addEventListener("change", async () => {
      if (!openedSpellTokenId) return;

      if (!canToggleUsed) {
        chk.checked = !chk.checked;
        return;
      }

      const all = boxes.querySelectorAll(".slotChk");
      const newUsed = [...all].filter(c => c.checked).length;

      try{
        const ref = doc(db, "rooms", roomId, "tokens", openedSpellTokenId);
        await updateDoc(ref, {
          [`spellSlots.${levelKey}.max`]: max,
          [`spellSlots.${levelKey}.used`]: newUsed,
          updatedAt: serverTimestamp(),
        });
      }catch(err){
        console.error(err);
        if (sInfo) sInfo.textContent = "❌ Erreur emplacements";
      }
    });

    boxes.appendChild(chk);
  }

  inputMax.onchange = async () => {
    if (!openedSpellTokenId) return;
    if (!canEditMax) return;

    let newMax = Number(inputMax.value);
    if (!Number.isFinite(newMax)) newMax = 0;
    newMax = Math.max(0, Math.min(10, Math.round(newMax)));

    const newUsed = Math.min(used, newMax);

    try{
      const ref = doc(db, "rooms", roomId, "tokens", openedSpellTokenId);
      await updateDoc(ref, {
        [`spellSlots.${levelKey}.max`]: newMax,
        [`spellSlots.${levelKey}.used`]: newUsed,
        updatedAt: serverTimestamp(),
      });
    }catch(err){
      console.error(err);
      if (sInfo) sInfo.textContent = "❌ Erreur emplacements";
    }
  };
}

function abilityMod(score){
  const n = Number(score);
  if (!Number.isFinite(n)) return 0;
  return Math.floor((n - 10) / 2);
}

function signed(n){
  return (n >= 0 ? "+" : "") + n;
}

function calcAbilitiesAndSaves(){
  const prof = Number(mProf.value);
  const profBonus = Number.isFinite(prof) ? prof : 0;

  const strMod = abilityMod(mStr.value);
  const dexMod = abilityMod(mDex.value);
  const conMod = abilityMod(mCon.value);
  const intMod = abilityMod(mInt.value);
  const wisMod = abilityMod(mWis.value);
  const chaMod = abilityMod(mCha.value);

  mStrMod.value = signed(strMod);
  mDexMod.value = signed(dexMod);
  mConMod.value = signed(conMod);
  mIntMod.value = signed(intMod);
  mWisMod.value = signed(wisMod);
  mChaMod.value = signed(chaMod);

  mStrSave.value = signed(strMod + (mStrSaveProf.checked ? profBonus : 0));
  mDexSave.value = signed(dexMod + (mDexSaveProf.checked ? profBonus : 0));
  mConSave.value = signed(conMod + (mConSaveProf.checked ? profBonus : 0));
  mIntSave.value = signed(intMod + (mIntSaveProf.checked ? profBonus : 0));
  mWisSave.value = signed(wisMod + (mWisSaveProf.checked ? profBonus : 0));
  mChaSave.value = signed(chaMod + (mChaSaveProf.checked ? profBonus : 0));
}

function autoCalcSkills(){
  const prof = Number(mProf.value);
  const profBonus = Number.isFinite(prof) ? prof : 0;

  const mods = {
    str: abilityMod(mStr.value),
    dex: abilityMod(mDex.value),
    con: abilityMod(mCon.value),
    int: abilityMod(mInt.value),
    wis: abilityMod(mWis.value),
    cha: abilityMod(mCha.value),
  };

  const calc = (abilKey, isProf) => mods[abilKey] + (isProf ? profBonus : 0);

  // DEX
  mSkillAcroVal.value = signed(calc("dex", mSkillAcro.checked));
  mSkillSleiVal.value = signed(calc("dex", mSkillSlei.checked));
  mSkillSteaVal.value = signed(calc("dex", mSkillStea.checked));

  // WIS
  mSkillAnimVal.value = signed(calc("wis", mSkillAnim.checked));
  mSkillInsiVal.value = signed(calc("wis", mSkillInsi.checked));
  mSkillMediVal.value = signed(calc("wis", mSkillMedi.checked));
  mSkillPercVal.value = signed(calc("wis", mSkillPerc.checked));
  mSkillSurvVal.value = signed(calc("wis", mSkillSurv.checked));

  // INT
  mSkillArcaVal.value = signed(calc("int", mSkillArca.checked));
  mSkillHistVal.value = signed(calc("int", mSkillHist.checked));
  mSkillInveVal.value = signed(calc("int", mSkillInve.checked));
  mSkillNatuVal.value = signed(calc("int", mSkillNatu.checked));
  mSkillReliVal.value = signed(calc("int", mSkillReli.checked));

  // CHA
  mSkillDeceVal.value = signed(calc("cha", mSkillDece.checked));
  mSkillIntiVal.value = signed(calc("cha", mSkillInti.checked));
  mSkillPersVal.value = signed(calc("cha", mSkillPers.checked));
  mSkillPerfVal.value = signed(calc("cha", mSkillPerf.checked));

  // STR
  mSkillAthlVal.value = signed(calc("str", mSkillAthl.checked));
}

    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

// Clamp dans le board
function clampPosition(el, x, y){
  const maxX = board.clientWidth - el.offsetWidth;
  const maxY = board.clientHeight - el.offsetHeight;
  x = Math.max(0, Math.min(x, maxX));
  y = Math.max(0, Math.min(y, maxY));
  return {x, y};
}

    // Si c'est le token qu'on est en train de déplacer, on le laisse tranquille
    if (id === activeId) return;

    const el = createTokenElement(id, data);
    board.appendChild(el);
  });
});

// Déplacement souris
document.addEventListener("mousemove", (e) => {
  if (!activeEl) return;
  wasDragged = true;
  const r = board.getBoundingClientRect();
  let x = e.clientX - r.left - dx;
  let y = e.clientY - r.top  - dy;
  const p = clampPosition(activeEl, x, y);
  activeEl.style.left = p.x + "px";
  activeEl.style.top  = p.y + "px";
});

document.addEventListener("mouseup", async () => {
  if (!activeEl) return;

  const id = activeId;
  const el = activeEl;

  activeEl = null;
  activeId = null;

  // position actuelle top-left
  let left = parseInt(el.style.left || "0", 10);
  let top  = parseInt(el.style.top  || "0", 10);

  // ✅ on snap le CENTRE du token sur le CENTRE d'un hex
  const size = el.offsetWidth || 50;
  const tokenCenterX = left + size/2;
  const tokenCenterY = top  + size/2;

  const { cx, cy } = snapPointToHexCenter(tokenCenterX, tokenCenterY);

  // nouveau top-left
  left = Math.round(cx - size/2);
  top  = Math.round(cy - size/2);

  // re-clamp dans le board (évite de sortir)
  const p = clampPosition(el, left, top);
  el.style.left = p.x + "px";
  el.style.top  = p.y + "px";

  // === conversion en coordonnées relatives ===
  const rx = board.clientWidth  ? p.x / board.clientWidth  : 0;
  const ry = board.clientHeight ? p.y / board.clientHeight : 0;

  await updateDoc(doc(db, "rooms", roomId, "tokens", id), { rx, ry, x: p.x, y: p.y });
  wasDragged = false;
});

}

// ===== COOLDOWN UI (minuterie live) =====
let cooldownTimer = null;
let cooldownUntil = 0;

function startCooldown(seconds){
  if (!diceMsg) return;

  if (cooldownTimer) clearInterval(cooldownTimer);

  const totalMs = Math.max(1, Number(seconds) || 1) * 1000;
  cooldownUntil = Date.now() + totalMs;

  diceMsg.dataset.totalMs = String(totalMs);
  diceMsg.style.setProperty("--p", "0%");

  tickCooldown();
  cooldownTimer = setInterval(tickCooldown, 200);
}

function tickCooldown(){
  const now = Date.now();
  const remainMs = cooldownUntil - now;

  if (remainMs <= 0){
    if (cooldownTimer) clearInterval(cooldownTimer);
    cooldownTimer = null;
    diceMsg.style.setProperty("--p", "100%");
    setDiceMsg("");
    return;
  }

  const remainS = Math.ceil(remainMs / 1000);
  setDiceMsg(`Attente… ${remainS}s`);

  const totalMs = Number(diceMsg.dataset.totalMs) || (remainS * 1000);
  const elapsed = Math.max(0, totalMs - remainMs);
  const p = Math.min(100, Math.round((elapsed / totalMs) * 100));
  diceMsg.style.setProperty("--p", p + "%");
}

function randIntCrypto(min, max) {
  const range = max - min + 1;
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return min + (arr[0] % range);
}

function pushDiceLog({label, value, sides, who, isCrit, isFumble}){
  if (!IS_MJ) return;
  if (!diceLogItems) return;

  const time = new Date().toLocaleTimeString([], {hour: "2-digit", minute:"2-digit"});
  const div = document.createElement("div");
  div.className = "diceLogItem";

  const left = document.createElement("div");
  left.innerHTML = `<span class="diceTag">${label}</span> → <b>${value}</b>${isCrit ? " ✅ CRIT" : ""}${isFumble ? " ❌ ÉCHEC" : ""}`;

  const right = document.createElement("div");
  right.className = "diceMeta";
  right.textContent = `${who || "?"} • ${time}`;

  div.appendChild(left);
  div.appendChild(right);

  diceLogItems.prepend(div);

  while (diceLogItems.children.length > 10){
    diceLogItems.removeChild(diceLogItems.lastChild);
  }
}

];

const COOLDOWN_MS = 5000;
let lastRollId = null;

function setAllDiceDisabled(disabled){
  DICE.forEach(d => {
    const btn = document.getElementById(d.id);
    if (btn) btn.disabled = disabled;
  });
}

function playRollAnimation(label, sides, finalValue, opts = {}) {
  setAllDiceDisabled(true);

  diceRes.classList.remove("crit", "fumble");
  const start = Date.now();
  const duration = 650;

  diceRes.textContent = "…";
  showMsg(`${label}...`);

  const ticker = setInterval(() => {
    diceRes.textContent = `${label} : ${randIntCrypto(1, sides)}`;

    if (Date.now() - start > duration) {
      clearInterval(ticker);

      diceRes.textContent = `${label} : ${finalValue}`;
      showMsg("");

      const isD20 = sides === 20;
      const isCrit = isD20 && finalValue === 20;
      const isFumble = isD20 && finalValue === 1;

      if (isCrit) diceRes.classList.add("crit");
      if (isFumble) diceRes.classList.add("fumble");

      pushDiceLog({
        label,
        value: finalValue,
        sides,
        who: opts.who,
        isCrit,
        isFumble
      });

      setAllDiceDisabled(false);
    }
  }, 55);
}

// Tout le monde écoute Firestore : affiche le même résultat
onSnapshot(diceRef, (snap) => {
  const data = snap.data();
  if (!data || data.kind !== "dice") return;
  if (!data.rollId || data.rollId === lastRollId) return;

  lastRollId = data.rollId;

  const sides = Number(data.sides);
  const value = Number(data.value);
  const label = String(data.label || `D${sides}`);

  if (!Number.isFinite(sides) || sides < 2) return;
  if (!Number.isFinite(value) || value < 1 || value > sides) return;

  playRollAnimation(label, sides, value, { who: data.by || "" });
});

// Clic sur un dé => nouveau jet (cooldown partagé)
DICE.forEach(d => {
  const btn = document.getElementById(d.id);
  if (!btn) return;

  btn.addEventListener("click", async () => {
    pulseButton(btn);
    if (btn.disabled) return;

    showMsg("");
    const whoName = IS_MJ ? "MJ" : (PLAYER_ID || "PJ");
    const value = randIntCrypto(1, d.sides);
    const rollId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());

    try {
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(diceRef);
        const old = snap.exists() ? snap.data() : null;

        const now = Date.now();
        const lastRollMs = old && Number.isFinite(Number(old.lastRollMs)) ? Number(old.lastRollMs) : 0;

        if (now - lastRollMs < COOLDOWN_MS) {
          const remain = Math.ceil((COOLDOWN_MS - (now - lastRollMs)) / 1000);
          throw new Error("COOLDOWN_" + remain);
        }

        tx.set(diceRef, {
          kind: "dice",
          sides: d.sides,
          label: d.label,
          value,
          rollId,
          by: whoName,
          lastRollMs: now,
          at: serverTimestamp(),
        }, { merge: true });
      });
    } catch (err) {
      const msg = String(err?.message || err);
      if (msg.startsWith("COOLDOWN_")) {
        const remain = Number(msg.split("_")[1] || "5");
        startCooldown(remain);
      } else {
        showMsg("❌ Erreur de lancer (permissions / réseau ?)");
        console.error(err);
      }
    }
  });
});

  </script>
